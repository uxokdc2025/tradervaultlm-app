<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Signals — TraderVault LM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --profit-soft:rgba(21,128,61,.12);--loss-soft:rgba(220,38,38,.12);--warn:#D97706;--warn-soft:rgba(217,119,6,.14);
  --page:#F7F6F1;--mkt-purple:#7C3AED;--mkt-purple-soft:rgba(124,58,237,.10);--mkt-green:#16A34A;--stripe:#635BFF;
  --bg:#FFFFFF;--card:#F8FAFC;--subtle:#F1F5F9;--border:#E2E8F0;--border-2:#CBD5E1;
  --head:#1E293B;--body:#475569;--muted:#64748B;--profit:#15803D;--loss:#DC2626;--accent:#CEFF00;
  --sb-bg:#101B25;--sb-fg:#9DAAB6;--sb-muted:#7E8C99;--sb-hover:#1B2731;--sb-border:#2A3640;
}
.tv-dark{
  --profit-soft:rgba(34,197,94,.16);--loss-soft:rgba(248,113,113,.16);--warn:#FBBF24;--warn-soft:rgba(251,191,36,.16);
  --page:#0B131B;--mkt-purple:#A78BFA;--mkt-purple-soft:rgba(167,139,250,.14);--mkt-green:#22C55E;
  --bg:#0B131B;--card:#101B25;--subtle:#1A2438;--border:#1F2E44;--border-2:#243450;
  --head:#E6EDF3;--body:#8B98A8;--muted:#5A6478;--profit:#22C55E;--loss:#F87171;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--page);color:var(--head);display:flex;height:100vh;overflow:hidden;font-size:14px}
#tv-root{display:flex;width:100%;height:100%}
/* ── SIDEBAR ── */
#sidebar{width:234px;min-width:234px;background:#101B25;border-right:1px solid #2A3640;display:flex;flex-direction:column;transition:width .2s;overflow:hidden;flex-shrink:0}
.sb-top{padding:18px 14px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2A3640;gap:8px}
.sb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;overflow:hidden}
.sb-logo img.sb-wordmark{height:22px;width:auto}
.sb-logo img.sb-mark{width:28px;height:28px}
.sb-collapse{background:transparent;border:none;cursor:pointer;color:#7E8C99;padding:4px;border-radius:4px;display:flex;flex-shrink:0}
.sb-collapse:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-section{font-size:9px;font-weight:700;text-transform:uppercase;color:#3D4756;letter-spacing:.6px;padding:12px 14px 3px;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:9px;padding:0 10px;height:34px;text-decoration:none;color:#8B95A4;font-size:13px;font-weight:400;border-radius:6px;margin:1px 5px;transition:background .15s;white-space:nowrap}
.nav-item:hover{background:rgba(255,255,255,.05)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.active-coral{color:#F87171;background:rgba(248,113,113,.10);box-shadow:inset 3px 0 0 0 #F87171;font-weight:600}
.nav-item.active-coral .nav-dot{background:#F87171}
.sb-bottom{padding:10px;border-top:1px solid #2A3640;flex-shrink:0}
.kill-btn{width:100%;background:rgba(255,107,107,.10);border:1px solid rgba(255,107,107,.22);color:#FF6B6B;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;font-family:inherit}
.kill-btn:hover{background:rgba(255,107,107,.18)}
.kill-btn.armed{background:rgba(255,107,107,.25);border-color:rgba(255,107,107,.5)}
.acct-sw{background:rgba(255,255,255,.04);border:1px solid #2A3640;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;position:relative}
.acct-av{width:26px;height:26px;border-radius:50%;background:#CAFF33;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#101B25;flex-shrink:0}
.acct-info{flex:1;min-width:0}
.acct-name{font-size:12px;font-weight:600;color:#E6EDF3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-type{font-size:10px;color:#7E8C99}
.acct-drop{position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:#1A2438;border:1px solid #2A3640;border-radius:8px;overflow:hidden;z-index:100;display:none}
.acct-drop.open{display:block}
.acct-opt{padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:#E6EDF3}
.acct-opt:hover{background:rgba(255,255,255,.06)}
.acct-opt-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#101B25;flex-shrink:0}
.clock-bar{display:flex;align-items:center;gap:6px;padding:7px 10px 2px;font-size:10px;color:#7E8C99}
.clock-dot{width:5px;height:5px;border-radius:50%;background:#CAFF33;flex-shrink:0}
/* ── TOPBAR ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;color:var(--head);flex:1}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.icon-btn:hover{background:var(--subtle)}
.btn{height:38px;padding:0 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none;font-family:inherit}
.btn-primary{background:var(--mkt-purple);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-secondary{background:var(--subtle);border:1px solid var(--border);color:var(--body)}
.btn-secondary:hover{background:var(--subtle);filter:brightness(.96)}
/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;background:var(--page)}
.ms-inner{max-width:1240px;margin:0 auto;padding:28px 32px 64px;display:flex;flex-direction:column;gap:28px}
/* ── STATS STRIP ── */
.stats-strip{display:flex;gap:16px}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.stat-val{font-size:28px;font-weight:800;color:var(--head);letter-spacing:-.02em;line-height:1}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-top:10px;line-height:1.3;display:block}
.stat-sub{font-size:13px;color:var(--muted);margin-top:5px;display:block}
/* ── PUBLISHED CARD ── */
.pub-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,36,.04)}
.pub-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer}
.pub-avatar{border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.pub-name{font-size:17px;font-weight:700;color:var(--head)}
.pub-sub{font-size:13px;color:var(--muted);margin-top:4px;display:block}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:6px;white-space:nowrap}
.badge-green{background:var(--profit-soft);color:var(--profit);border:1px solid color-mix(in srgb,var(--profit) 26%,transparent)}
.badge-amber{background:var(--warn-soft);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent)}
.badge-gray{background:var(--subtle);color:var(--muted);border:1px solid var(--border-2,var(--border))}
.badge-purple{background:var(--mkt-purple-soft);color:var(--mkt-purple);border:1px solid color-mix(in srgb,var(--mkt-purple) 30%,transparent)}
.badge-blue{background:rgba(59,130,246,.10);color:#2563EB;border:1px solid rgba(59,130,246,.30)}
.score-num{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;margin-left:4px}
.pub-actions{display:flex;gap:9px}
.act-btn{height:40px;padding:0 18px;border-radius:9px;border:1px solid var(--border-2,var(--border));background:var(--card);color:var(--body);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.act-btn:hover{background:var(--subtle)}
.act-btn.danger{color:var(--loss);border-color:color-mix(in srgb,var(--loss) 30%,transparent)}
.chevron{color:var(--muted);margin-left:4px;flex-shrink:0}
.pub-body{display:flex;gap:20px;padding:4px 20px 20px;border-top:1px solid var(--border)}
.pub-left{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:12px;padding-top:18px}
.curve-wrap{background:var(--subtle);border:1px solid var(--border);border-radius:12px;padding:14px 16px;height:110px}
.metrics-row{display:flex;gap:10px}
.metric-box{flex:1;background:var(--subtle);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.metric-val{font-size:17px;font-weight:700;color:var(--head);font-variant-numeric:tabular-nums;line-height:1.1;display:block}
.metric-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-top:5px;display:block}
.revenue-bar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:12px;border:1px solid var(--mkt-purple-soft);background:linear-gradient(135deg,var(--mkt-purple-soft),rgba(45,212,191,.08))}
.pub-right{flex:0 0 360px;max-width:360px;border-left:1px solid var(--border);padding-left:20px;padding-top:18px}
.activity-row{display:flex;align-items:center;gap:11px;padding:11px 0}
.activity-row+.activity-row{border-top:1px solid var(--border)}
/* ── CONFIRM BAR ── */
.confirm-bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-top:1px solid var(--border)}
/* ── EARNINGS ── */
.earnings-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.earnings-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px}
.earnings-row{display:flex;border-top:1px solid var(--border)}
.esum-cell{flex:1;padding:18px 22px}
.esum-cell+.esum-cell{border-left:1px solid var(--border)}
.esum-val{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;display:block}
.esum-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-top:9px;display:block}
.esum-sub{font-size:13px;color:var(--muted);margin-top:3px;display:block}
.band-label{padding:12px 22px;background:var(--subtle);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.band-label span{font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
.tbl-head{display:flex;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border)}
.tbl-th{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
.tbl-row{display:flex;align-items:center;padding:14px 22px}
.tbl-row+.tbl-row{border-top:1px solid var(--border)}
.tbl-row:hover{background:var(--subtle)}
.mini-avatar{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
/* ── EMPTY STATE ── */
.empty-state{max-width:560px;margin:40px auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}
.empty-icon{width:60px;height:60px;border-radius:14px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;background:var(--mkt-purple-soft);color:var(--mkt-purple)}
/* ── PUBLISH DRAWER ── */
#pub-backdrop{position:fixed;inset:0;z-index:420;background:rgba(15,23,36,.5);opacity:0;pointer-events:none;transition:opacity .22s}
#pub-backdrop.open{opacity:1;pointer-events:auto}
#pub-panel{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:94vw;z-index:421;background:var(--page);border-left:1px solid var(--border);box-shadow:-16px 0 48px -12px rgba(15,23,36,.28);transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
#pub-panel.open{transform:translateX(0)}
.pub-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px}
.pub-drawer-title{font-size:18px;font-weight:700;color:var(--head)}
.step-nav{display:flex;gap:4px;padding:0 24px;border-bottom:1px solid var(--border)}
.step-btn{flex:1;padding:13px 4px;background:none;border:none;border-bottom:2px solid transparent;cursor:default;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
.step-btn.clickable{cursor:pointer}
.step-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--subtle);color:var(--muted)}
.step-dot.active{background:var(--mkt-purple);color:#fff}
.step-dot.done{background:var(--profit);color:#fff}
.step-lbl{font-size:12.5px;font-weight:600;color:var(--muted)}
.step-lbl.active{color:var(--head)}
.pub-drawer-body{flex:1;min-height:0;overflow-y:auto;padding:22px 24px}
.pub-drawer-footer{flex-shrink:0;display:flex;gap:10px;padding:16px 24px;border-top:1px solid var(--border);background:var(--card)}
.pub-field-label{font-size:14px;font-weight:600;color:var(--head);display:block}
.pub-field-sub{font-size:12.5px;color:var(--muted);margin-top:2px;margin-bottom:10px;display:block}
.instance-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 14px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;cursor:not-allowed;opacity:.55}
.instance-row.ok{cursor:pointer;opacity:1}
.instance-row.selected{background:var(--mkt-purple-soft);border-color:var(--mkt-purple)}
.radio-circle{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--border-2,var(--border));display:flex;align-items:center;justify-content:center}
.radio-circle.on{border-color:var(--mkt-purple)}
.radio-dot{width:9px;height:9px;border-radius:50%;background:var(--mkt-purple)}
.price-input-wrap{display:flex;align-items:center;height:46px;border:1px solid var(--border-2,var(--border));border-radius:10px;overflow:hidden;background:var(--card)}
.price-prefix{padding:0 12px;font-size:16px;font-weight:700;color:var(--muted);border-right:1px solid var(--border);height:100%;display:flex;align-items:center}
.price-field{width:100px;height:100%;border:none;outline:none;padding:0 12px;font-family:inherit;font-size:16px;font-weight:600;color:var(--head);background:transparent}
.price-suffix{padding:0 14px;font-size:14px;color:var(--muted);border-left:1px solid var(--border);height:100%;display:flex;align-items:center}
.note-box{padding:13px 15px;border-radius:11px;background:var(--mkt-purple-soft);border:1px solid color-mix(in srgb,var(--mkt-purple) 22%,transparent);font-size:13px;color:var(--mkt-purple);font-weight:500;line-height:1.55}
.free-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card)}
.form-textarea{width:100%;min-height:110px;resize:vertical;box-sizing:border-box;padding:12px 14px;font-family:inherit;font-size:14px;line-height:1.55;color:var(--head);background:var(--card);border:1px solid var(--border-2,var(--border));border-radius:10px;outline:none}
.form-textarea.short{min-height:74px}
.form-textarea:focus{border-color:var(--mkt-purple);box-shadow:0 0 0 3px var(--mkt-purple-soft)}
.char-count{display:block;text-align:right;font-size:11px;color:var(--muted);margin-top:5px}
.risk-box{padding:12px 14px;border-radius:10px;background:var(--subtle);border:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.55}
.vis-row{display:flex;align-items:flex-start;gap:14px;padding:15px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card)}
.vis-row.locked{opacity:.6}
.toggle-pill{width:42px;height:24px;flex-shrink:0;border-radius:999px;border:none;padding:3px;cursor:pointer;display:flex;transition:background .15s;align-items:center}
.toggle-pill.on{background:var(--mkt-purple);justify-content:flex-end}
.toggle-pill.off{background:var(--border-2,var(--border));justify-content:flex-start}
.toggle-thumb{width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);flex-shrink:0}
.stripe-icon{width:52px;height:52px;border-radius:13px;background:#635BFF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;margin:0 auto}
.stripe-connected{display:flex;align-items:center;gap:12px;padding:16px;border-radius:12px;border:1px solid var(--profit-soft);background:var(--profit-soft)}
/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--head);color:var(--bg,#fff);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:600;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 10px 30px rgba(15,23,36,.28)}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="tv-root">

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-top">
    <a class="sb-logo" href="index.html" id="logo-link">
      <img class="sb-mark" src="assets/tv-mark.svg" alt="TV" id="logo-mark" style="display:none">
      <img class="sb-wordmark" src="assets/tv-wordmark-dark.svg" alt="TraderVault LM" id="logo-word">
    </a>
    <button class="sb-collapse" id="collapse-btn" title="Collapse sidebar">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 8h8M4 5h8M4 11h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="sb-nav">
    <a class="nav-item" href="index.html"><span class="nav-dot" style="background:#CAFF33"></span><span class="nav-label">Overview</span></a>
    <div class="nav-section nav-label">Strategies &amp; Analysis</div>
    <a class="nav-item" href="strategies.html"><span class="nav-dot" style="background:#3DD5A8"></span><span class="nav-label">Strategies</span></a>
    <a class="nav-item" href="analysis.html"><span class="nav-dot" style="background:#3DD5A8"></span><span class="nav-label">Analysis</span></a>
    <div class="nav-section nav-label">Trading</div>
    <a class="nav-item" href="chart.html"><span class="nav-dot" style="background:#FBB23A"></span><span class="nav-label">Chart &amp; signals</span></a>
    <a class="nav-item" href="audit.html"><span class="nav-dot" style="background:#FBB23A"></span><span class="nav-label">Audit log</span></a>
    <div class="nav-section nav-label">Copy Trading</div>
    <a class="nav-item active-coral" href="mysignals.html"><span class="nav-dot"></span><span class="nav-label">My signals</span></a>
    <a class="nav-item" href="marketplace.html"><span class="nav-dot" style="background:#F87171"></span><span class="nav-label">Marketplace</span></a>
  </div>
  <div class="sb-bottom">
    <button class="kill-btn" id="kill-btn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#FF6B6B" stroke-width="1.5"/><path d="M8 4V8.5" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r=".75" fill="#FF6B6B"/></svg>
      <span id="kill-label" class="nav-label">Kill switch</span>
    </button>
    <div class="acct-sw" id="acct-sw">
      <div class="acct-av" id="acct-av">AP</div>
      <div class="acct-info nav-label">
        <div class="acct-name" id="acct-name">Alpaca Paper</div>
        <div class="acct-type" id="acct-type">Paper trading</div>
      </div>
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" class="nav-label"><path d="M4 6l4 4 4-4" stroke="#7E8C99" stroke-width="1.4" stroke-linecap="round"/></svg>
      <div class="acct-drop" id="acct-drop">
        <div class="acct-opt" data-name="Alpaca Paper" data-type="Paper trading" data-init="AP" data-color="#CAFF33"><div class="acct-opt-av" style="background:#CAFF33">AP</div>Alpaca Paper</div>
        <div class="acct-opt" data-name="Alpaca Live" data-type="Live trading" data-init="AL" data-color="#5AC57A"><div class="acct-opt-av" style="background:#5AC57A">AL</div>Alpaca Live</div>
        <div class="acct-opt" data-name="IB TWS" data-type="Futures" data-init="IB" data-color="#FBB23A"><div class="acct-opt-av" style="background:#FBB23A">IB</div>IB TWS</div>

// ── CURVE SVG ──
function curveSvg(seed, w, h, stroke) {
  const n = 26;
  let acc = 9;
  for (let i = 0; i < seed.length; i++) acc = (acc * 31 + seed.charCodeAt(i)) % 99991;
  const rnd = i => { const x = Math.sin((acc+1)*(i+1)*0.7321)*9973.13; return x - Math.floor(x); };
  const pts = [];
  for (let i = 0; i < n; i++) {
    const base = 0.16 + (i/(n-1))*0.64;
    pts.push(Math.max(0.06, Math.min(0.95, base + (rnd(i)-0.5)*0.12)));
  }
  const X = i => (i/(n-1))*w;
  const Y = v => h - v*h;
  let line = `M ${X(0).toFixed(1)} ${Y(pts[0]).toFixed(1)}`;
  for (let i = 1; i < n; i++) line += ` L ${X(i).toFixed(1)} ${Y(pts[i]).toFixed(1)}`;
  const area = line + ` L ${w} ${h} L 0 ${h} Z`;
  const gid = 'msg' + Math.abs(acc) + Math.round(w);
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${stroke}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${stroke}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

  renderPublishDrawer();
  $('pub-backdrop').classList.add('open');

function closePublish() {
  state.publish = null;
  $('pub-backdrop').classList.remove('open');
  $('pub-panel').classList.remove('open');
}
function setPub(patch) {
  if (!state.publish) return;
  Object.assign(state.publish, patch);
  renderPublishDrawer();
}
function pubGoStep(n) {
  if (!state.publish || n > state.publish.step) return;
  setPub({ step: n });
}

  const p = state.publish;
  if (!p) return;
  renderStepNav(p);
  renderStepBody(p);
  renderPubFooter(p);
}

function renderStepNav(p) {
  const steps = ['Instance','Pricing','Description','Visibility','Payout'];
  const cur = p.step;
  const html = steps.map((lbl, i) => {
    const n = i+1;
    const done = n < cur;
    const active = n === cur;
    const dotClass = active ? 'active' : (done ? 'done' : '');
    const dotContent = done ? svgIcon(['M20 6 9 17l-5-5'],'#fff',12,3) : n;
    const clickable = n <= cur ? 'class="step-btn clickable"' : 'class="step-btn"';
    const borderColor = active ? 'var(--mkt-purple)' : (done ? 'var(--profit)' : 'transparent');
    return `<button type="button" ${clickable} onclick="pubGoStep(${n})" style="border-bottom-color:${borderColor}">
      <div class="step-dot ${dotClass}">${dotContent}</div>
      <span class="step-lbl ${active?'active':''}">${lbl}</span>
    </button>`;
  }).join('');
  $('step-nav-wrap').innerHTML = `<div class="step-nav">${html}</div>`;
}

function renderStepBody(p) {
  let html = '';
  if (p.step === 1) {
    const rows = INSTANCES.map(it => {
      const on = p.instance === it.id;
      const okClass = it.ok ? 'ok' : '';
      const selClass = on ? 'selected' : '';
      const noteColor = it.ok ? 'var(--profit)' : 'var(--loss)';
      return `<button type="button" class="instance-row ${okClass} ${selClass}" onclick="${it.ok?`selectInstance('${it.id}')`:''}" ${it.ok?'':'disabled'}>
        <div class="radio-circle ${on?'on':''}">${on?'<div class="radio-dot"></div>':''}</div>
        <div style="flex:1;min-width:0">
          <span style="display:block;font-size:14px;font-weight:600;color:var(--head)">${it.name}</span>
          <span style="font-size:12px;color:var(--muted)">${it.meta}</span>
        </div>
        <span style="font-size:12px;font-weight:700;color:${noteColor};white-space:nowrap">${it.note} ${it.ok?'✓':'✗'}</span>
      </button>`;
    }).join('');
    html = `<div>
      <span class="pub-field-label">Choose a live instance to publish</span>
      <span class="pub-field-sub">Must be live for 30+ days. Paper and draft instances are not eligible.</span>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">${rows}</div>
    </div>`;
  } else if (p.step === 2) {
    const fee = p.free ? 0 : Math.round(p.price * 0.2 * 100) / 100;
    const you = p.free ? 0 : Math.round((p.price - fee) * 100) / 100;
    const note = p.free
      ? 'Free strategies still route signals to subscribers. No platform fee applies.'
      : `At $${p.price}/month: TraderVault takes 20% ($${fee.toFixed(2)}) · You receive $${you.toFixed(2)} per subscriber.`;
    const priceInput = p.free ? '' : `
      <div>
        <span class="pub-field-label">Monthly price</span>
        <span class="pub-field-sub">Minimum $9, maximum $999.</span>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="price-input-wrap">
            <div class="price-prefix">$</div>
            <input class="price-field" type="number" min="9" max="999" value="${p.price}" oninput="setPub({price:Math.max(9,Math.min(999,+this.value||9))})">
            <div class="price-suffix">/month</div>
          </div>
        </div>
      </div>`;
    html = `<div style="display:flex;flex-direction:column;gap:18px">
      ${priceInput}
      <div class="free-row">
        <div style="flex:1">
          <span style="display:block;font-size:14px;font-weight:600;color:var(--head)">Free</span>
          <span style="font-size:12.5px;color:var(--muted)">Offer at no cost</span>
        </div>
        ${toggleHtml(p.free,'onclick="setPub({free:!state.publish.free})"')}
      </div>
      <div class="note-box">${note}</div>
    </div>`;
  } else if (p.step === 3) {
    html = `<div style="display:flex;flex-direction:column;gap:18px">
      <div>
        <span class="pub-field-label">Strategy description</span>
        <span class="pub-field-sub">What does this strategy trade? What is the logic? Who is it for?</span>
        <textarea class="form-textarea" maxlength="500" placeholder="Describe your strategy…" oninput="setPub({desc:this.value})">${p.desc}</textarea>
        <span class="char-count">${p.desc.length} / 500</span>
      </div>
      <div>
        <span class="pub-field-label">What to expect</span>
        <span class="pub-field-sub">Signal frequency, typical hold times, sessions traded.</span>
        <textarea class="form-textarea short" maxlength="200" placeholder="Typically 2–4 signals per day during NY session…" oninput="setPub({expect:this.value})">${p.expect}</textarea>
        <span class="char-count">${p.expect.length} / 200</span>
      </div>
      <div>
        <span class="pub-field-label">Risk disclosure</span>
        <div class="risk-box" style="margin-top:8px">Past performance does not guarantee future results. Trading involves risk of loss. Subscribers should only trade with money they can afford to lose.</div>
      </div>
    </div>`;
  } else if (p.step === 4) {
    const dnaAvail = p.instance === 'i1';
    function visRow(on, toggleExpr, title, desc, locked) {
      return `<div class="vis-row ${locked?'locked':''}">
        <div style="flex:1">
          <span style="display:block;font-size:14px;font-weight:600;color:var(--head)">${title}</span>
          <span style="display:block;font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5">${desc}</span>
        </div>
        ${locked ? '<span style="font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;padding-top:3px">Locked</span>' : toggleHtml(on,`onclick="${toggleExpr}"`)}
      </div>`;
    }
    html = `<div>
      <span class="pub-field-label">What data is visible to potential subscribers?</span>
      <span class="pub-field-sub">More transparency = more trust = more subscribers.</span>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:10px">
        ${visRow(p.audit,'setPub({audit:!state.publish.audit})','Public audit trail','Subscribers see every signal, fill, skip, and rejection. Strongly recommended — this is your trust layer.',false)}
        ${visRow(dnaAvail&&p.dna,'dnaAvailToggle()','Win/Loss DNA',dnaAvail?'Share the context engine patterns that predict wins.':'No context data recorded for this instance. Add context recording in Backtest Config to unlock this.',!dnaAvail)}
        ${visRow(p.subc,'setPub({subc:!state.publish.subc})','Subscriber count visible','Show how many people subscribe to your strategy. Social proof helps conversion.',false)}
      </div>
    </div>`;
  } else {
    // step 5 — payout
    if (!p.stripe) {
      html = `<div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:20px 8px">
        <div class="stripe-icon">S</div>
        <span style="font-size:18px;font-weight:700;color:var(--head)">Connect with Stripe</span>
        <span style="font-size:14px;color:var(--muted);max-width:340px;line-height:1.55">Secure payouts directly to your bank account. Takes less than 2 minutes to set up.</span>
        <button type="button" onclick="setPub({stripe:true});showToast('Stripe account connected')"
          style="height:48px;padding:0 26px;border:none;border-radius:11px;background:#635BFF;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px">
          Connect with Stripe
          ${svgIcon(['M5 12h14','m12 5 7 7-7 7'],'#fff',16)}
        </button>
        <span style="font-size:12px;color:var(--muted);max-width:360px;line-height:1.55">Once connected, payouts are sent on the 1st of each month. Minimum payout threshold is $25. Standard Stripe processing fees apply.</span>
      </div>`;
    } else {
      html = `<div style="display:flex;flex-direction:column;gap:16px">
        <div class="stripe-connected">
          <div style="width:38px;height:38px;border-radius:10px;background:#635BFF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0">S</div>
          <div style="flex:1">
            <span style="display:block;font-size:14px;font-weight:600;color:var(--head)">Payouts go to designer@uxokdc.com</span>
            <span style="display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--profit);font-weight:600;margin-top:2px">
              ${svgIcon(['M20 6 9 17l-5-5'],'var(--profit)',13,2.6)} Verified
            </span>
          </div>
          <button type="button" onclick="setPub({stripe:false})" style="background:none;border:none;color:var(--mkt-purple);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Change</button>
        </div>
        <span style="font-size:12.5px;color:var(--muted);line-height:1.55">Payouts are sent on the 1st of each month. Minimum payout threshold is $25.</span>
      </div>`;
    }
  }
  $('pub-step-body').innerHTML = html;
}

function renderPubFooter(p) {
  const last = p.step === 5;
  const ctaLabel = last ? (p.stripe ? 'Publish strategy' : 'Connect Stripe to continue') : 'Continue';
  const canNext = p.step === 1 ? !!p.instance : (last ? p.stripe : true);
  const back = p.step > 1
    ? `<button type="button" class="btn btn-secondary" onclick="setPub({step:${p.step-1}})">Back</button>`
    : '';
  const ctaBg = canNext ? 'var(--mkt-purple)' : 'var(--subtle)';
  const ctaColor = canNext ? '#fff' : 'var(--muted)';
  const ctaAction = canNext
    ? (last ? 'doPubFinish()' : `setPub({step:${p.step+1}})`)
    : '';
  $('pub-footer').innerHTML = `
    ${back}
    <button type="button" style="flex:1;height:48px;border:none;border-radius:11px;background:${ctaBg};color:${ctaColor};font-family:inherit;font-size:15px;font-weight:700;cursor:${canNext?'pointer':'not-allowed'};display:inline-flex;align-items:center;justify-content:center;gap:8px" ${canNext?`onclick="${ctaAction}"`:'disabled'}>
      ${ctaLabel}
      ${!last ? svgIcon(['M5 12h14','m12 5 7 7-7 7'],canNext?'#fff':'var(--muted)',16) : ''}
    </button>`;
}

// ── PUBLISH ACTIONS ──
function selectInstance(id) { setPub({ instance: id }); }
function dnaAvailToggle() {
  if (state.publish && state.publish.instance === 'i1') {
    setPub({ dna: !state.publish.dna });
  }
}
function doPubFinish() {
  closePublish();
  renderMySignals();
  showToast('Your strategy is now live on the Marketplace.');
}
function openEditPublish(id) {
  const s = PUBLISHED_BASE.find(x => x.id === id);
  if (s) openPublish(s);
}

// ── CARD INTERACTIONS ──
function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  renderMySignals();
}
function setConfirm(id, type) {
  state.confirm = { id, type };
  renderMySignals();
}
function cancelConfirm() {
  state.confirm = null;
  renderMySignals();
}
function doConfirm(id) {
  const c = state.confirm;
  if (!c || c.id !== id) return;
  const s = PUBLISHED_BASE.find(x => x.id === id);
  if (c.type === 'pause') {
    state.statusOverride[id] = 'paused';
    state.confirm = null;
    renderMySignals();
    showToast((s?s.name:'Strategy') + ' paused — subscribers not charged');
  } else {
    state.unpublished[id] = true;
    state.confirm = null;
    renderMySignals();
    showToast((s?s.name:'Strategy') + ' unpublished — subscribers notified');
  }
}
function doResume(id) {
  state.statusOverride[id] = 'live';
  state.confirm = null;
  const s = PUBLISHED_BASE.find(x => x.id === id);
  renderMySignals();
  showToast((s?s.name:'Strategy') + ' resumed — signals routing');
}

// ── SIDEBAR ──
function applySidebar() {
  const sb = $('sidebar');
  const c = state.collapsed;
  sb.style.width = c ? '58px' : '234px';
  sb.style.minWidth = c ? '58px' : '234px';
  document.querySelectorAll('.nav-label,.nav-section').forEach(el => el.style.display = c ? 'none' : '');
  $('logo-mark').style.display = c ? 'flex' : 'none';
  $('logo-word').style.display = c ? 'none' : '';
}

$('collapse-btn').addEventListener('click', () => {
  state.collapsed = !state.collapsed;
  applySidebar();
});

// ── THEME ──
$('theme-btn').addEventListener('click', () => {
  state.dark = !state.dark;
  $('tv-root').classList.toggle('tv-dark', state.dark);
});

// ── ACCOUNT SWITCHER ──
$('acct-sw').addEventListener('click', e => {
  if (e.target.closest('.acct-opt')) return;
  state.acctOpen = !state.acctOpen;
  $('acct-drop').classList.toggle('open', state.acctOpen);
});
document.querySelectorAll('.acct-opt').forEach(o => {
  o.addEventListener('click', () => {
    $('acct-name').textContent = o.dataset.name;
    $('acct-type').textContent = o.dataset.type;
    $('acct-av').textContent = o.dataset.init;
    $('acct-av').style.background = o.dataset.color;
    state.acctOpen = false;
    $('acct-drop').classList.remove('open');
  });
});
document.addEventListener('click', e => {
  if (!$('acct-sw').contains(e.target)) {
    state.acctOpen = false;
    $('acct-drop').classList.remove('open');
  }
});

// ── KILL SWITCH ──
$('kill-btn').addEventListener('click', () => {
  if (!state.killArmed) {
    state.killArmed = true;
    $('kill-btn').classList.add('armed');
    $('kill-label').textContent = 'Confirm kill';
    setTimeout(() => {
      if (state.killArmed) {
        state.killArmed = false;
        $('kill-btn').classList.remove('armed');
        $('kill-label').textContent = 'Kill switch';
      }
    }, 3000);
  } else {
    state.killArmed = false;
    $('kill-btn').classList.remove('armed');
    $('kill-label').textContent = 'Kill switch';
    showToast('Kill switch activated — all positions closed');
  }
});

// ── PUBLISH OPEN/CLOSE ──
$('pub-open-btn').addEventListener('click', () => openPublish(null));
$('pub-close-btn').addEventListener('click', closePublish);
$('pub-backdrop').addEventListener('click', closePublish);

// ── UTC CLOCK ──
function tickClock() {
  const d = new Date();
  const t = [d.getUTCHours(), d.getUTCMinutes(), d.getUTCSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  $('clock').textContent = 'UTC ' + t;
}
tickClock();
setInterval(tickClock, 1000);

// ── INIT ──
renderMySignals();
</script>
</body>
</html>
