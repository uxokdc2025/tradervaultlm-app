class Component extends DCLogic {
  state = { filter: 'All', strat: 'mb1', range: 'Today', search: '', openRow: null, collapsed: {}, notes: [

  componentWillUnmount() { if (this._t) clearTimeout(this._t); }

  matches(ev) {

    return true;
  }

    return this.d({ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: '12px' }, ...cards.map((c, i) => this.d({ key: i, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '12px', padding: '16px 18px' },
      this.sp({ display: 'block', fontSize: '26px', fontWeight: 800, color: c.c, lineHeight: '1', fontVariantNumeric: 'tabular-nums' }, c.v),

      this.d({ position: 'absolute', right: '14px', top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }, this.ic(['m6 9 6 6 6-6'], 'var(--muted)', 17)));
  }

    const pillBar = this.d({ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }, ...pills.map(p => {
