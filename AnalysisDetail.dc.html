<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { tab: 'overview', openRow: null, dismissed: {}, toastMsg: null,
    optimizeOpen: false, opt: null, optBase: null, ctxOpen: false, splitOpen: false, newStratOpen: false, newStratName: '' };

  componentWillUnmount() { if (this._t) clearTimeout(this._t); }

  e(t, p, ...k) { return React.createElement(t, p, ...k); }
  d(style, ...k) { return React.createElement('div', { style }, ...k); }
  sp(style, ...k) { return React.createElement('span', { style }, ...k); }
  btn(p, ...k) { return React.createElement('button', { type: 'button', ...p }, ...k); }
  ic(paths, color, size) { const h = React.createElement; return h('svg', { width: size || 16, height: size || 16, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', style: { flexShrink: 0 } }, paths.map((d, i) => h('path', { key: i, d }))); }

  card(extra, ...kids) { return this.d({ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '12px', ...(extra || {}) }, ...kids); }

  // ── horizontal % bar row (DNA / timing / day-of-week) ───────────────────
  barRow(label, pct, color, opts) {
    opts = opts || {};
    return this.d({ display: 'flex', alignItems: 'center', gap: '14px', padding: '7px 0' },
      this.sp({ flex: opts.labelFlex || '0 0 ' + (opts.labelW || '150px'), fontSize: '13px', color: 'var(--body)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }, label),

      this.sp({ flex: '0 0 44px', textAlign: 'right', fontSize: '13px', fontWeight: 700, color: color, fontVariantNumeric: 'tabular-nums' }, pct + '%'));
  }

  // chip with source color
  srcChip(label, kind, paths) {
    const map = {
      blue:   { bg: 'var(--info-soft)', c: 'var(--info)', b: 'color-mix(in srgb, var(--info) 35%, transparent)' },
      purple: { bg: 'rgba(124,58,237,.10)', c: '#7C3AED', b: 'rgba(124,58,237,.30)' },

  // ═══════════ HEADER ═══════════
  headerEl() {
    const dot = () => this.sp({ color: 'var(--border)', margin: '0 2px' }, '·');
    const meta = this.d({ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap', fontSize: '13px', color: 'var(--muted)', marginTop: '7px' },

  // ═══════════ TABS ═══════════

        this.e('path', { d: 'M0,262 C70,256 120,242 180,236 C250,229 280,214 340,206 C400,198 440,182 500,158 C560,134 590,150 640,128 C700,104 730,98 790,82 C850,66 890,60 950,46 L1000,40 L1000,300 L0,300 Z', fill: 'url(#eqf)' }),
        this.e('path', { d: 'M0,262 C70,256 120,242 180,236 C250,229 280,214 340,206 C400,198 440,182 500,158 C560,134 590,150 640,128 C700,104 730,98 790,82 C850,66 890,60 950,46 L1000,40', fill: 'none', stroke: 'var(--profit)', strokeWidth: '3', vectorEffect: 'non-scaling-stroke' })));

        this.d({ display: 'flex', alignItems: 'center', gap: '9px' }, this.ic(isWin ? ['M12 19V5', 'm5 12 7-7 7 7'] : ['M12 5v14', 'm5 12 7 7 7-7'], c, 17), this.sp({ fontSize: '13px', fontWeight: 700, color: c }, title)),

      this.d({ flex: 1, minWidth: 0 }, this.sp({ display: 'block', fontSize: '13px', fontWeight: 700, color: 'var(--head)' }, name), this.sp({ fontSize: '11px', color: 'var(--muted)' }, 'Buy & sell conditions set')),

  optFooter() {

  optimizeDrawerEl() {

      this.btn({ onClick: () => { try { window.location.href = 'Analysis.dc.html'; } catch (e) {} }, style: { display: 'inline-flex', alignItems: 'center', gap: '5px', background: 'none', border: 'none', padding: 0, fontFamily: 'var(--sans)', fontSize: '13px', color: '#7C3AED', cursor: 'pointer', fontWeight: 500 } }, this.ic(['m15 18-6-6 6-6'], 'currentColor', 14), 'Analysis'),

  renderVals() {
    const goto = (f) => () => { try { window.location.href = f; } catch (e) {} };
    return {
      detailEl: this.detailEl(),
      goOverview: goto('Overview.dc.html'),
      goStrategies: goto('Strategies.dc.html'),
      goAnalysis: goto('Analysis.dc.html'),
      goChart: goto('Chart.dc.html'),
      goAudit: goto('Audit.dc.html'),
      goSoon: () => this.toast('That page is coming soon'),
    };
  }
}
