<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;--subtle:#F1F5F9;--border:#E2E8F0;
  --muted:#64718A;--body:#475569;--head:#1E293B;
  --lime:#C8FF00;--navy:#101B25;
  --accent:#7C3AED;--accent-on:#FFFFFF;--accent-soft:rgba(124,58,237,.12);--accent-ring:rgba(124,58,237,.24);
  --profit:#15803D;--loss:#DC2626;--warn:#D97706;--info:#2563EB;
  --profit-soft:rgba(21,128,61,.12);--loss-soft:rgba(220,38,38,.12);--warn-soft:rgba(217,119,6,.12);
  --sb-bg:#101B25;--sb-muted:#7E8C99;--sb-hover:#1B2731;--sb-border:#2A3640;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter',ui-sans-serif,system-ui,sans-serif;
}
.tv-dark{
  --bg:#0B131B;--subtle:#18242F;--border:#28333D;
  --muted:#8492A0;--body:#AEB9C4;--head:#F1F4F7;
  --accent:#C8FF00;--accent-on:#101B25;--accent-soft:rgba(200,255,0,.15);--accent-ring:rgba(200,255,0,.25);
  --profit:#22C55E;--loss:#F87171;--warn:#FBBF24;
  --profit-soft:rgba(34,197,94,.15);--loss-soft:rgba(248,113,113,.15);--warn-soft:rgba(251,191,36,.15);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--sans);color:var(--body);background:#07090F;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes tvpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes tvspin{to{transform:rotate(360deg);}}
@keyframes tvbreathe{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(124,58,237,.35);}50%{transform:scale(1.06);box-shadow:0 0 0 10px rgba(124,58,237,0);}}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</helmet>

<div class="{{ themeClass }}" style="display:flex;height:100vh;width:100%;overflow:hidden;background:var(--bg);">

  <!-- ═══ SIDEBAR ═══ -->
  <aside style="{{ sbStyle }}">
    <a onClick="{{ onPage.strategies }}" style="display:flex;align-items:center;padding:18px 14px 16px;gap:10px;text-decoration:none;cursor:pointer;{{ collapseJustify }}">
      <div style="width:30px;height:30px;flex-shrink:0;border-radius:7px;background:var(--lime);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 30 30" fill="none" aria-hidden="true"><path d="M6.5 8L15 21.5L23.5 8" stroke="#101B25" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="{{ logoTextStyle }}">
        <span style="font-size:11px;font-weight:600;color:#fff;letter-spacing:0.06em;line-height:1.2;display:block;">TRADER VAULT</span>
        <span style="font-size:8px;font-weight:700;color:var(--lime);letter-spacing:0.16em;display:block;">LM</span>
      </div>
    </a>
    <nav role="menu" aria-label="Primary navigation" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 10px;display:flex;flex-direction:column;gap:2px;">
      <a role="menuitem" aria-current="{{ aria.strategies }}" onClick="{{ onPage.strategies }}" style="{{ nav.overview }}" style-hover="background:rgba(202,255,51,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#CAFF33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span style="{{ labelStyle }}">Overview</span>
      </a>
      <div style="{{ sectionStyle }}">STRATEGIES</div>
      <a role="menuitem" aria-current="{{ aria.strategies }}" onClick="{{ onPage.strategies }}" style="{{ nav.strategies }}" style-hover="background:rgba(61,213,168,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3DD5A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 6a9 9 0 0 1-9 9"/><path d="M18 9V6h-3"/></svg>
        <span style="{{ labelStyle }}">Strategies</span>
        <span style="{{ badge.strategies }}">5</span>
      </a>
      <a role="menuitem" aria-current="{{ aria.analysis }}" onClick="{{ onPage.analysis }}" style="{{ nav.analysis }}" style-hover="background:rgba(61,213,168,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3DD5A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>
        <span style="{{ labelStyle }}">Analysis</span>
      </a>
      <div style="{{ sectionStyle }}">TRADING</div>
      <a role="menuitem" aria-current="false" style="{{ nav.chart }}" style-hover="background:rgba(251,178,58,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FBB23A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="14" y="6" width="3" height="11"/></svg>
        <span style="{{ labelStyle }}">Chart &amp; signals</span>
      </a>
      <a role="menuitem" aria-current="false" style="{{ nav.journal }}" style-hover="background:rgba(251,178,58,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FBB23A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span style="{{ labelStyle }}">Journal</span>
      </a>
      <a role="menuitem" aria-current="false" style="{{ nav.audit }}" style-hover="background:rgba(251,178,58,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FBB23A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span style="{{ labelStyle }}">Audit log</span>
      </a>
      <div style="{{ sectionStyle }}">COPY TRADING</div>
      <a role="menuitem" aria-current="false" style="{{ nav.accounts }}" style-hover="background:rgba(248,113,113,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
        <span style="{{ labelStyle }}">Accounts</span>
        <span style="{{ badge.accounts }}">3</span>
      </a>
      <a role="menuitem" aria-current="false" style="{{ nav.configure }}" style-hover="background:rgba(248,113,113,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6V4.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11h.1a2 2 0 0 1 0 4h-.1z"/></svg>
        <span style="{{ labelStyle }}">Configure</span>
      </a>
      <a role="menuitem" aria-current="false" style="{{ nav.signal }}" style-hover="background:rgba(248,113,113,.08)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M4.9 19.1A10 10 0 0 1 4.9 5"/><path d="M7.8 16.2a6 6 0 0 1 0-8.4"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8a6 6 0 0 1 0 8.4"/><path d="M19.1 4.9a10 10 0 0 1 0 14.2"/></svg>
        <span style="{{ labelStyle }}">Signal sync</span>
      </a>
      <div style="height:1px;background:var(--sb-border);margin:5px 0;flex-shrink:0;"></div>
      <a role="menuitem" aria-current="false" style="{{ nav.settings }}" style-hover="background:rgba(255,255,255,.05)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8B95A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.4" fill="var(--sb-bg)"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.4" fill="var(--sb-bg)"/></svg>
        <span style="{{ labelStyle }}">Settings</span>
      </a>
    </nav>
    <div style="{{ footerStyle }}">
      <div style="padding:14px;border-top:1px solid var(--sb-border);display:flex;flex-direction:column;gap:8px;">
        <div style="position:relative;">
          <button onClick="{{ onAccountClick }}" aria-label="Account menu" style="display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;margin:-6px -8px 0;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;" style-hover="background:rgba(255,255,255,0.05)">
            <span style="flex:1;min-width:0;display:block;">
              <span style="font-size:10px;font-weight:600;color:var(--sb-muted);letter-spacing:0.1em;display:block;">ACCOUNT</span>
              <span style="font-size:13px;font-weight:600;color:#fff;display:block;">Alpaca paper</span>
            </span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--sb-muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="{{ acctChevron }}"><path d="m6 15 6-6 6 6"/></svg>
          </button>
          {{ accountMenuEl }}
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 6px var(--lime);flex:none;"></span>
          <span ref="{{ clockRef }}" style="font-family:var(--mono);font-size:12px;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:0.04em;"></span>
          <span style="font-size:10px;font-weight:600;color:var(--sb-muted);letter-spacing:0.08em;">UTC</span>
        </div>
        <button onClick="{{ onKill }}" style="{{ killStyle }}" style-hover="filter:brightness(1.08)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          {{ killLabel }}
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;">
    <header style="height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);">
      <button onClick="{{ onToggleCollapse }}" aria-label="{{ collapseTitle }}" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;flex:none;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--body);cursor:pointer;padding:0;" style-hover="background:var(--subtle)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="{{ collapseIconStyle }}"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <div style="display:flex;align-items:center;gap:8px;min-width:0;">
        <span style="font-size:15px;font-weight:700;color:var(--head);white-space:nowrap;">{{ pageTitle }}</span>
        <sc-if value="{{ hasPageSub }}" hint-placeholder-val="{{ false }}">
          <span style="color:var(--border);">·</span>
          <span style="font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ pageSub }}</span>
        </sc-if>
      </div>
      <div style="flex:1;"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--body);"><span style="width:7px;height:7px;border-radius:50%;background:var(--profit);animation:tvpulse 2s infinite;"></span>WS connected</span>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><span style="width:7px;height:7px;border-radius:50%;background:var(--muted);"></span>equity closed</span>
      </div>
      <div style="width:1px;height:22px;background:var(--border);"></div>
      <button onClick="{{ onToggleTheme }}" aria-label="Toggle theme" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;" style-hover="background:var(--subtle)">
        <span style="{{ themeMoon }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span style="{{ themeSun }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></span>
      </button>
      <button style="display:flex;align-items:center;gap:7px;padding:3px 7px 3px 3px;border-radius:999px;border:1px solid var(--border);background:var(--bg);cursor:pointer;" style-hover="background:var(--subtle)">
        <span style="width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;color:var(--lime);font-size:12px;font-weight:700;flex:none;">JD</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);"><path d="m6 9 6 6 6-6"/></svg>
      </button>
    </header>
    <div style="flex:1;min-height:0;overflow:hidden;">{{ contentEl }}</div>
  </div>

  <!-- Dim overlay -->
  <sc-if value="{{ anyDrawerOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ onCloseDimmer }}" style="position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.4);"></div>
  </sc-if>

  <!-- Active drawer -->
  {{ drawerEl }}

  <!-- Discard confirm -->
  <sc-if value="{{ discardOpen }}" hint-placeholder-val="{{ false }}">
    {{ discardEl }}
  </sc-if>

  <!-- Toast stack -->
  {{ toastEl }}

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    page: 'strategies',
    collapsed: false,
    dark: (()=>{ try{return localStorage.getItem('tv-theme')==='dark';}catch(e){return false;} })(),
    killArmed: false, accountMenuOpen: false, bAiExpand: false,
    // builder
    builderOpen: false, builderStep: 1, builderDirty: false, discardOpen: false,
    bType: null, bName: 'New strategy', bSymbol: 'SPY', bTf: '5m',
    bIndicators: ['EMA(9)', 'EMA(21)'], bTp: '2.0', bSl: '1.0', bTrailing: false,
    bPosSz: '2', bMaxLoss: '5', bMaxTrades: '3', bAiPrompt: '',
    bMode: 'ai', bTab: 'indicators', bGenerating: false, genStep: 0, bAiGen: false, mInds: [], mPick: null, mPickerOpen: false, mEditIdx: null, mSearch: '', mBuyMode: 'all', mSellMode: 'first', mBuyThresh: 2, mSellThresh: 1, mLogicEdit: null, mAskAI: null, mAskText: '', mSuggestDismissed: false,
    // backtest
    btOpen: false, btStep: 'config', btCardId: null,
    btProgress: 0, btLogs: [], btDatePreset: '3M',
    btCapital: '100000', btCommission: '0.005', btSlippage: '5', btLiveParams: false,
    btAccount: '$100,000', btRisk: '1', btMaxPos: '3',
    btAsset: 'futures', btSymCode: 'ES', btAssetOpen: false, btAssetFilter: 'all', btSymQuery: '', btStyle: 'intraday', btDetail: 'standard',
    btTf: '5m', btStopLoss: 'ATR-based (1.5×)', btTakeProfit: '2R multiple', btPartialExit: '50% at TP1, run rest', btBreakEven: 'Move to BE at 1R', btTrailingStop: 'None',
    btRiskPerTrade: '1%', btSession: 'NY only', btDirty: false, btResetOpen: false, btPendingStyle: null,
    aiOpenKey: null, aiPick: null,
    // analysis
    analysisFilter: 'all', analysisDetailId: null, analysisTab: 'overview', anaCollapsed: [], aiInsightsOpen: false,
    sortBy: 'wr', cardMenuId: null, statusFilter: 'All', searchQuery: '', expandedStrat: null,
    // toasts
    toasts: [], _toastId: 0,
  };

  componentDidMount() {
    this._t = setInterval(() => { if (this._clockEl) this._clockEl.textContent = this.fmtClock(); }, 1000);
    if (this._clockEl) this._clockEl.textContent = this.fmtClock();
    window.addEventListener('keydown', this.onEsc);
  }
  componentWillUnmount() { clearInterval(this._t); clearInterval(this._btTimer); clearInterval(this._genTimer); window.removeEventListener('keydown', this.onEsc); }
  componentDidUpdate() {
    const isRunning = this.state.btStep === 'running' && this.state.btOpen;
    if (isRunning && !this._btRunning) { this._btRunning = true; this.startBtProgress(); }
    if (!isRunning && this._btRunning) { this._btRunning = false; clearInterval(this._btTimer); this._btTimer = null; }
  }
  fmtClock() { const d=new Date(),p=n=>String(n).padStart(2,'0'); return p(d.getUTCHours())+':'+p(d.getUTCMinutes())+':'+p(d.getUTCSeconds()); }
  onEsc = (e) => {
    if (e.key !== 'Escape') return;
    if (this.state.btResetOpen) return this.setState({ btResetOpen:false, btPendingStyle:null });
    if (this.state.cardMenuId) return this.setState({ cardMenuId:null });
    if (this.state.aiOpenKey) return this.setState({ aiOpenKey:null, aiPick:null });
    if (this.state.accountMenuOpen) return this.setState({ accountMenuOpen:false });
    if (this.state.discardOpen) return this.setState({ discardOpen: false });
    if (this.state.builderOpen) { if (this.state.builderDirty) return this.setState({ discardOpen: true }); return this.setState({ builderOpen: false }); }
    if (this.state.btOpen) return this.setState({ btOpen: false, btStep: 'config' });
  };

  // ── Toast ──────────────────────────────────────────────────────────────────
  toast(msg, intent='success', undoFn=null) {
    const id = this.state._toastId + 1;
    const ms = intent==='error'?null:intent==='warning'?6000:4000;
    this.setState(s=>({ toasts:[...s.toasts.slice(-2),{id,msg,intent,undoFn}], _toastId:id }));
    if (ms) setTimeout(()=>this.setState(s=>({toasts:s.toasts.filter(t=>t.id!==id)})),ms);
  }
  dismissToast(id) { this.setState(s=>({toasts:s.toasts.filter(t=>t.id!==id)})); }

  // ── Backtest presets (Trading-style → full column of settings) ──
  btPresets() {
    return {
      scalping:{btTf:'1m',btStopLoss:'ATR-based (0.8×)',btTakeProfit:'1.5R multiple',btPartialExit:'None',btBreakEven:'None',btTrailingStop:'None',btRiskPerTrade:'0.5%',btDatePreset:'1M',btDetail:'simple',btSession:'NY + London only'},
      intraday:{btTf:'5m',btStopLoss:'ATR-based (1.5×)',btTakeProfit:'2R multiple',btPartialExit:'50% at TP1, run rest',btBreakEven:'Move to BE at 1R',btTrailingStop:'None',btRiskPerTrade:'1%',btDatePreset:'3M',btDetail:'standard',btSession:'NY only'},
      swing:{btTf:'1H',btStopLoss:'ATR-based (2×)',btTakeProfit:'3R multiple',btPartialExit:'50% at TP1, run rest',btBreakEven:'Move to BE at TP1',btTrailingStop:'ATR trail',btRiskPerTrade:'1%',btDatePreset:'6M',btDetail:'standard',btSession:'Any session'},
      position:{btTf:'Daily',btStopLoss:'ATR-based (3×)',btTakeProfit:'Open-ended (trail)',btPartialExit:'None',btBreakEven:'None',btTrailingStop:'Chandelier exit',btRiskPerTrade:'0.5%',btDatePreset:'1Y',btDetail:'advanced',btSession:'Any session'},
    };
  }
  styleLabel(k){ return ({scalping:'Scalping',intraday:'Intraday',swing:'Swing',position:'Position'})[k]||k; }
  applyBtPreset(style) {
    const p=this.btPresets()[style];
    this.setState({ btStyle:style, ...p, btRisk:String(parseFloat(p.btRiskPerTrade)), btDirty:false, btResetOpen:false, btPendingStyle:null });
  }
  selectBtStyle(style) {
    if (style===this.state.btStyle) return;
    if (this.state.btDirty) return this.setState({ btResetOpen:true, btPendingStyle:style });
    this.applyBtPreset(style);
  }
  setBtField(key,value) { this.setState({ [key]:value, btDirty:true }); }
  openAi(key){ this.setState(s=>({ aiOpenKey:s.aiOpenKey===key?null:key, aiPick:s.aiOpenKey===key?null:s[key] })); }
  aiApply(key){ const v=this.state.aiPick; this.setState({ aiOpenKey:null, aiPick:null }); if(v!=null) this.setBtField(key,v); }
  startAiGen(){
    const p=(this.state.bAiPrompt||'').toLowerCase();
    const has=(k)=>p.includes(k);

  renderVals() {
    const st=this.state,c=st.collapsed;
    const pmap={strategies:'Strategies',analysis:'Analysis','analysis-detail':'Analysis'};
    const smap={strategies:'4 strategies · 1 live · 2 paper · 1 draft',analysis:`${this.analyses().length} runs · last 30 days`,'analysis-detail':this.analyses().find(a=>a.id===st.analysisDetailId)?.strategy||''};
    const badgeB='font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:auto;';
    const isStrategies=st.page==='strategies',isAnalysis=st.page==='analysis'||st.page==='analysis-detail';
    const anyDrawerOpen=st.builderOpen||st.btOpen;
    const navIds=['overview','strategies','analysis','chart','journal','audit','accounts','configure','signal','settings'];

    let contentEl;
    if (st.page==='strategies') contentEl=this.buildStrategiesEl();
    else if (st.page==='analysis') contentEl=this.buildAnalysisEl();
    else contentEl=this.buildAnalysisDetailEl();

    let drawerEl=null;
    if (st.builderOpen) drawerEl=this.buildBuilderEl();
    else if (st.btOpen) drawerEl=this.buildBtEl();

    // Account switcher (upward drawer from the sidebar footer)
    const accounts=[
      {name:'Alpaca paper',type:'Paper trading',bal:'$100,000',active:true,live:false},
      {name:'Alpaca live',type:'Live · margin',bal:'$48,320',active:false,live:true},
      {name:'Interactive Brokers',type:'Live · cash',bal:'$12,905',active:false,live:true},
    ];
    const sg=(ds,col)=>this.e('svg',{width:15,height:15,viewBox:'0 0 24 24',fill:'none',stroke:col||'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',style:{flexShrink:0}},...(Array.isArray(ds)?ds:[ds]).map((d,i)=>this.e('path',{key:i,d})));
    const acctClose=()=>this.setState({accountMenuOpen:false});
    const menuItem=(iconD,label,cb,danger)=>this.btn({key:label,onClick:()=>{acctClose();cb&&cb();},style:{display:'flex',alignItems:'center',gap:'10px',width:'100%',padding:'9px 10px',borderRadius:'8px',background:'transparent',border:'none',cursor:'pointer',textAlign:'left',fontFamily:'var(--sans)',fontSize:'13px',fontWeight:500,color:danger?'#FF8A8A':'#E6ECF2'}},sg(iconD,danger?'#FF8A8A':'var(--sb-muted)'),label);
    const accountMenuEl = st.accountMenuOpen ? this.e('div',{},
      this.e('div',{onClick:acctClose,style:{position:'fixed',inset:0,zIndex:190}}),
      this.d({position:'absolute',left:0,right:0,bottom:'calc(100% + 10px)',zIndex:200,background:'#16222C',border:'1px solid var(--sb-border)',borderRadius:'12px',boxShadow:'0 -12px 44px -12px rgba(0,0,0,0.7)',padding:'6px'},
        this.sp({fontSize:'10px',fontWeight:700,letterSpacing:'0.1em',color:'var(--sb-muted)',padding:'8px 10px 6px',display:'block'},'TRADING ACCOUNT'),
        ...accounts.map(a=>this.btn({key:a.name,onClick:()=>{acctClose();if(!a.active)this.toast('Switched to '+a.name,'success');},style:{display:'flex',alignItems:'center',gap:'10px',width:'100%',padding:'8px 10px',borderRadius:'8px',background:a.active?'rgba(255,255,255,0.06)':'transparent',border:'none',cursor:'pointer',textAlign:'left'}},
          this.d({width:'30px',height:'30px',borderRadius:'8px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--navy)',color:'var(--lime)',fontSize:'11px',fontWeight:700},a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()),
          this.d({flex:1,minWidth:0},
            this.sp({fontSize:'13px',fontWeight:600,color:'#fff',display:'block'},a.name),
            this.sp({fontSize:'11px',color:'var(--sb-muted)'},a.type+' · '+a.bal)
          ),
          a.active?sg('M20 6 9 17l-5-5','var(--lime)'):this.d({width:'7px',height:'7px',borderRadius:'50%',background:a.live?'var(--profit)':'var(--sb-muted)',flexShrink:0,marginRight:'4px'})
        )),
        this.d({height:'1px',background:'var(--sb-border)',margin:'5px 6px'}),
        menuItem(['M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z','M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z'],'Account settings',()=>this.toast('Opening account settings…','success')),
        menuItem(['M2 5h20v14H2z','M2 10h20'],'Billing & usage',()=>this.toast('Opening billing…','success')),
        menuItem(['M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z','M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3','M12 17h.01'],'Help & docs',()=>this.toast('Opening help…','success')),
        this.d({height:'1px',background:'var(--sb-border)',margin:'5px 6px'}),
        menuItem(['M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4','M16 17l5-5-5-5','M21 12H9'],'Log out',()=>this.toast('Logged out','warning'),true)
      )
    ) : null;

    return {
      themeClass: st.dark?'tv-dark':'',
      sbStyle: `width:${c?'66px':'234px'};flex:none;background:var(--sb-bg);display:flex;flex-direction:column;overflow:hidden;transition:width .18s ease;`,
      collapseJustify: c?'justify-content:center;':'',
      logoTextStyle: c?'display:none;':'',
      labelStyle: c?'display:none;':'flex:1;',
      sectionStyle: `padding:${c?'12px 0 4px':'14px 12px 5px'};font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--sb-muted);${c?'display:none;':''}`,
      footerStyle: c?'display:none;':'flex:none;',
      collapseTitle: c?'Expand navigation':'Collapse navigation',
      collapseIconStyle: `flex:none;transition:transform .18s;transform:rotate(${c?'180deg':'0deg'});`,
      onToggleCollapse: ()=>this.setState(s=>({collapsed:!s.collapsed})),
      killLabel: st.killArmed?'ARMED':'KILL',
      killStyle: st.killArmed?'display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border-radius:8px;border:1px solid var(--loss);background:var(--loss);color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:0.06em;cursor:pointer;':'display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border-radius:8px;border:1px solid rgba(220,38,38,.5);background:rgba(220,38,38,.14);color:#FF8A8A;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:0.06em;cursor:pointer;',
      onKill: ()=>this.setState(s=>({killArmed:!s.killArmed})),
      onAccountClick: ()=>this.setState(s=>({accountMenuOpen:!s.accountMenuOpen})),
      accountMenuEl,
      acctChevron: `flex:none;transition:transform .18s;transform:rotate(${st.accountMenuOpen?'180deg':'0deg'});`,
      clockRef: (el)=>{this._clockEl=el;if(el)el.textContent=this.fmtClock();},
      themeMoon: `display:${st.dark?'none':'flex'};`,
      themeSun: `display:${st.dark?'flex':'none'};color:var(--accent);`,
      onToggleTheme: ()=>{const d=!st.dark;try{localStorage.setItem('tv-theme',d?'dark':'light');}catch(e){}this.setState({dark:d});},
      nav: Object.fromEntries(navIds.map(id=>[id,this.navStyle(id)])),
      aria: {strategies:isStrategies?'page':'false',analysis:isAnalysis?'page':'false'},
      badge: {
        strategies: badgeB+(isStrategies?'background:rgba(61,213,168,.18);color:#3DD5A8;':'background:rgba(255,255,255,.08);color:var(--sb-muted);'),
        accounts: badgeB+'background:rgba(255,255,255,.08);color:var(--sb-muted);',
      },
      onPage: {
        strategies: ()=>this.setState({page:'strategies'}),
        analysis: ()=>this.setState({page:'analysis'}),
      },
      pageTitle: pmap[st.page]||'TraderVault',
      pageSub: smap[st.page]||'',
      hasPageSub: !!(smap[st.page]),
      contentEl, anyDrawerOpen, drawerEl,
      onCloseDimmer: ()=>{
        if(st.builderOpen){if(st.builderDirty)this.setState({discardOpen:true});else this.setState({builderOpen:false});}
        else if(st.btOpen)this.setState({btOpen:false});
      },
      discardOpen: st.discardOpen,
      discardEl: this.buildDiscardEl(),
      toastEl: this.buildToastsEl(),
    };
  }
}
</script>
</body>
</html>
