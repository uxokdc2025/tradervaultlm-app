  tabSystem() {
    const providers = [['Anthropic (Claude)', 'Strategy authoring, AI Coach, pattern analysis', 'default'], ['Ollama Cloud', 'Alternative model provider — bring your own key', 'key'], ['OpenAI', 'Future providers', 'soon']];
    return this.d({ display: 'flex', flexDirection: 'column', gap: '22px' },
      this.d({ padding: '13px 15px', borderRadius: '10px', background: 'var(--subtle)', display: 'flex', gap: '10px', alignItems: 'flex-start' }, this.ic(['M12 16v-4', 'M12 8h.01', 'M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18z'], 'var(--muted)', 16), this.sp({ fontSize: '13px', color: 'var(--body)', lineHeight: '1.5' }, "Most users don't need to configure anything here. AI works out of the box using the platform's shared keys.")),
      this.d({}, this.secHead('AI providers'),
        this.card({ padding: '4px 18px', marginTop: '14px' }, ...providers.map(([n, use, status], i) => this.d({ key: n, display: 'flex', alignItems: 'center', gap: '14px', padding: '15px 0', borderBottom: i < providers.length - 1 ? '1px solid var(--border)' : 'none' },
          this.d({ flex: 1, minWidth: 0 }, this.sp({ display: 'block', fontSize: '14px', fontWeight: 700, color: 'var(--head)' }, n), this.sp({ display: 'block', fontSize: '12.5px', color: 'var(--muted)', marginTop: '2px' }, use)),
          status === 'default' ? this.sp({ fontSize: '11px', fontWeight: 700, color: 'var(--profit)', background: 'var(--profit-soft)', borderRadius: '5px', padding: '4px 10px' }, 'Platform default') : status === 'key' ? this.linkBtn('Add key', () => this.toast('Add provider key — encrypted at rest')) : this.sp({ fontSize: '11px', fontWeight: 700, color: 'var(--muted)', background: 'var(--subtle)', borderRadius: '5px', padding: '4px 10px' }, 'Coming soon'))))),
      this.d({}, this.secHead('Developer'),
        this.card({ padding: '16px 18px', marginTop: '14px', display: 'flex', alignItems: 'center', gap: '16px', flexWrap: 'wrap' },
          this.d({ flex: 1, minWidth: '200px' }, this.sp({ display: 'block', fontSize: '14px', fontWeight: 700, color: 'var(--head)' }, 'Developer audit log'), this.sp({ display: 'block', fontSize: '12.5px', color: 'var(--muted)', marginTop: '2px' }, 'Raw system events and internal logs — no plain-English translation.')),
          this.btn({ onClick: () => this.toast('Opening raw developer log'), style: { height: '40px', padding: '0 16px', borderRadius: '9px', background: 'var(--card)', color: 'var(--head)', border: '1px solid var(--border)', fontFamily: 'var(--sans)', fontSize: '14px', fontWeight: 600, cursor: 'pointer' } }, 'View log'))),
      this.d({}, this.secHead('API access'),
        this.card({ padding: '20px 18px', marginTop: '14px', textAlign: 'center' }, this.sp({ fontSize: '13px', color: 'var(--muted)' }, 'API keys, webhooks, and rate limits — coming soon.'))));
  }

  tabContent() {
    switch (this.state.tab) {
      case 'profile': return this.tabProfile();
      case 'subscription': return this.tabSubscription();
      case 'appearance': return this.tabAppearance();
      case 'trading': return this.tabTrading();
      case 'notifications': return this.tabNotifications();
      case 'brokers': return this.tabBrokers();
      case 'system': return this.tabSystem();
      default: return null;
    }
  }

  deleteDialog() {
    if (!this.state.deleteOpen) return null;
    const dialog = this.d({ width: 'min(480px,94vw)', background: 'var(--card)', borderRadius: '16px', boxShadow: '0 30px 70px -20px rgba(15,23,36,.5)', padding: '22px' },
      this.sp({ display: 'block', fontSize: '18px', fontWeight: 800, color: 'var(--head)', marginBottom: '10px' }, 'Are you sure?'),
      this.e('p', { style: { margin: '0 0 18px', fontSize: '14px', color: 'var(--body)', lineHeight: '1.55' } }, 'This permanently deletes your account, all strategies, all instances, and all data. This cannot be undone.'),
      this.d({ display: 'flex', gap: '10px', justifyContent: 'flex-end' },
        this.btn({ onClick: () => this.setState({ deleteOpen: false }), style: { height: '44px', padding: '0 18px', borderRadius: '10px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--body)', fontFamily: 'var(--sans)', fontSize: '14px', fontWeight: 600, cursor: 'pointer' } }, 'Keep my account'),
        this.btn({ onClick: () => { this.setState({ deleteOpen: false }); this.toast('Account deletion is disabled in this demo'); }, style: { height: '44px', padding: '0 18px', borderRadius: '10px', background: 'var(--loss)', border: 'none', color: '#fff', fontFamily: 'var(--sans)', fontSize: '14px', fontWeight: 700, cursor: 'pointer' } }, 'Delete my account')));
    return this.e('div', { onClick: () => this.setState({ deleteOpen: false }), style: { position: 'fixed', inset: 0, zIndex: 200, background: 'rgba(15,23,36,.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } }, this.e('div', { onClick: (e) => e.stopPropagation() }, dialog));
  }

  settingsEl() {
    const st = this.state;
    const toastEl = st.toastMsg ? this.e('div', { style: { position: 'fixed', bottom: '20px', right: '20px', zIndex: 300, background: 'var(--head)', color: 'var(--bg)', padding: '11px 16px', borderRadius: '9px', fontSize: '13px', fontWeight: 500, boxShadow: '0 8px 24px rgba(15,23,36,.22)', maxWidth: '340px' } }, st.toastMsg) : null;
    const header = this.d({ padding: '22px 26px', borderBottom: '1px solid var(--border)' }, this.sp({ display: 'block', fontSize: '26px', fontWeight: 800, color: 'var(--head)', letterSpacing: '-0.02em' }, 'Settings'), this.sp({ display: 'block', fontSize: '14px', color: 'var(--muted)', marginTop: '4px' }, 'Account preferences and configuration'));
    const body = this.d({ flex: 1, minHeight: 0, display: 'flex' }, this.tabNav(), this.d({ flex: 1, minWidth: 0, overflowY: 'auto', padding: '24px 26px 48px' }, this.d({ maxWidth: '760px' }, this.tabContent())));
    return this.d({ height: '100%', display: 'flex', flexDirection: 'column', minHeight: 0, background: 'var(--bg)' }, header, body, this.deleteDialog(), toastEl);
  }

  renderVals() {
    const goto = (f) => () => { try { window.location.href = f; } catch (e) {} };
    return { settingsEl: this.settingsEl(), goOverview: goto('Overview.dc.html'), goStrategies: goto('Strategies.dc.html'), goAnalysis: goto('Analysis.dc.html'), goChart: goto('Chart.dc.html'), goAudit: goto('Audit.dc.html'), goSoon: () => this.toast('That page is coming soon') };
  }
}
</script>
</body>
</html>
