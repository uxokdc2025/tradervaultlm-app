  curveSvg(seed, w, h, stroke) {
    const n = 26, pts = [];
    let acc = 9; for (let i = 0; i < seed.length; i++) acc = (acc * 31 + seed.charCodeAt(i)) % 99991;
    const rnd = (i) => { const x = Math.sin((acc + 1) * (i + 1) * 0.7321) * 9973.13; return x - Math.floor(x); };

    for (let i = 1; i < n; i++) line += ' L ' + X(i).toFixed(1) + ' ' + Y(pts[i]).toFixed(1);
    const area = line + ' L ' + w + ' ' + h + ' L 0 ' + h + ' Z';

  publishedCard(s) {
    const status = this.statusOf(s);
    const open = !!this.state.expanded[s.id];
    const confirming = this.state.confirm && this.state.confirm.id === s.id;
    const actBtn = (label, on, danger) => this.btn({ onClick: (e) => { e.stopPropagation(); on(); }, style: { height: '40px', padding: '0 18px', borderRadius: '9px', border: '1px solid ' + (danger ? 'var(--tv-red-border,#FECACA)' : 'var(--border-2,var(--border))'), background: 'var(--card)', color: danger ? 'var(--loss)' : 'var(--body)', fontFamily: 'var(--sans)', fontSize: '14px', fontWeight: 600, cursor: 'pointer' }, 'style-hover': 'background:var(--subtle)' }, label);
    const actions = status === 'paused'
      ? [actBtn('Resume', () => { this.setState(st => ({ statusOverride: { ...st.statusOverride, [s.id]: 'live' } })); this.toast(s.name + ' resumed — signals routing'); }), actBtn('Unpublish', () => this.setState({ confirm: { id: s.id, type: 'unpublish' } }), true)]

    const header = this.e('div', { onClick: () => this.setState(st => ({ expanded: { ...st.expanded, [s.id]: !st.expanded[s.id] } })), style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '18px 20px', cursor: 'pointer' } },

        this.sp({ display: 'block', fontSize: '13px', color: 'var(--muted)', marginTop: '4px' }, s.asset + ' · ' + s.tf + ' · ' + s.style + ' · Published ' + s.published)),

      this.sp({ fontSize: '22px', fontWeight: 800, color: this.scoreColor(s.score), fontVariantNumeric: 'tabular-nums', marginLeft: '4px' }, '' + s.score),
      this.d({ display: 'flex', gap: '9px', marginLeft: '6px' }, ...actions),
      this.d({ color: 'var(--muted)', marginLeft: '4px' }, this.ic([open ? 'm18 15-6-6-6 6' : 'm6 9 6 6 6-6'], 'currentColor', 20)));
    const confirmBar = confirming ? this.confirmBar(s) : null;

        this.d({ display: 'flex', gap: '10px' }, this.metricBox('Return', '+' + s.ret + '%', 'var(--profit)'), this.metricBox('Win rate', s.win + '%', 'var(--profit)'), this.metricBox('Max DD', s.dd + '%', 'var(--loss)'), this.metricBox('Sharpe', '' + s.sharpe, 'var(--head)')),
