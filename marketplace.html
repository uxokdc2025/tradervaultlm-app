<style>
:root{
  --bg:#FFFFFF;--card:#F8FAFC;--subtle:#F1F5F9;--border:#E2E8F0;--input:#CBD5E1;
  --muted:#64718A;--body:#475569;--head:#1E293B;
  --lime:#C8FF00;--navy:#101B25;--navy-light:#18242F;
  --accent:#7C3AED;--accent-on:#FFFFFF;--accent-soft:rgba(124,58,237,.12);--link:#7C3AED;
  --profit:#15803D;--loss:#DC2626;--warn:#D97706;
  --profit-soft:rgba(21,128,61,.12);--loss-soft:rgba(220,38,38,.12);--warn-soft:rgba(217,119,6,.14);
  --sb-bg:#101B25;--sb-fg:#9DAAB6;--sb-muted:#7E8C99;--sb-hover:#1B2731;--sb-border:#2A3640;
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Inter',ui-sans-serif,system-ui,sans-serif;
  --page:#F7F6F1;--mkt-purple:#7C3AED;--mkt-purple-soft:rgba(124,58,237,.10);--mkt-green:#16A34A;--stripe:#635BFF;
}
.tv-dark{
  --bg:#0B131B;--card:#101B25;--subtle:#18242F;--border:#28333D;--input:#2F3C47;
  --muted:#8492A0;--body:#AEB9C4;--head:#F1F4F7;--link:#A78BFA;
  --navy:#18242F;--navy-light:#1C2832;
  --accent:#C8FF00;--accent-on:#101B25;--accent-soft:rgba(200,255,0,.16);
  --profit:#22C55E;--loss:#F87171;--warn:#FBBF24;
  --profit-soft:rgba(34,197,94,.16);--loss-soft:rgba(248,113,113,.16);--warn-soft:rgba(251,191,36,.16);
  --page:#0B131B;--mkt-purple:#A78BFA;--mkt-purple-soft:rgba(167,139,250,.14);--mkt-green:#22C55E;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--sans);color:var(--body);background:var(--bg);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:2px solid var(--bg);}
button{font-family:var(--sans);}a{text-decoration:none;}
@keyframes tvpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes mkt-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.8);}}
@keyframes mkt-fade{from{opacity:0;}to{opacity:1;}}
@keyframes mkt-pop{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.mkt-scroll::-webkit-scrollbar{width:10px;}
.mkt-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
</style>
</head>

        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M2 7h20"/><path d="M12 7v15"/></svg>
        <span class="nav-label" style="color:#fff;font-weight:600;">Marketplace</span></a>
      <a href="mysignals.html" style="display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;font-size:14px;color:var(--sb-fg);text-decoration:none;cursor:pointer;white-space:nowrap;overflow:hidden;">

<!-- Manage Drawer -->

<!-- Flow Overlay -->
<div id="flow-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(15,23,36,.55);align-items:flex-start;justify-content:center;overflow-y:auto;padding:48px 20px;animation:mkt-fade .2s ease;">

<script>
// ── State ──
const state = {
  collapsed:false, dark:false, acctOpen:false, killArmed:false, profileOpen:false,
  search:'', asset:'all', sort:'top', pill:'All',
  subs:{'nq-momentum':true,'vwap-eu':true},
  subMeta:{'nq-momentum':{since:'Jun 1',account:'Alpaca paper'},'vwap-eu':{since:'May 20',account:'Alpaca live'}},
  paused:{},
  detailId:null, manageOpen:false,
  flow:null, confirmCancel:null,
};

// ── Sidebar ──
function applySidebar(){
  const sb=document.getElementById('sidebar'),c=state.collapsed;
  sb.style.width=c?'58px':'234px';
  document.querySelectorAll('.nav-label').forEach(el=>el.style.display=c?'none':'');
  document.querySelectorAll('.nav-section').forEach(el=>el.style.display=c?'none':'');
  document.getElementById('logo-mark').style.display=c?'block':'none';
  document.getElementById('logo-wordmark').style.display=c?'none':'block';
  document.getElementById('sb-footer').style.display=c?'none':'block';
}
function fmtClock(d){return[d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()].map(n=>String(n).padStart(2,'0')).join(':');}
function tickClock(){const el=document.getElementById('clock-display');if(el)el.textContent=fmtClock(new Date());}
tickClock();setInterval(tickClock,1000);
function applyTheme(){
  document.body.classList.toggle('tv-dark',state.dark);
  document.getElementById('theme-moon').style.display=state.dark?'none':'inline-flex';
  document.getElementById('theme-sun').style.display=state.dark?'inline-flex':'none';
}
function applyKill(){
  const btn=document.getElementById('kill-btn'),label=document.getElementById('kill-label');
  if(state.killArmed){btn.style.background='rgba(239,68,68,.9)';btn.style.color='#fff';btn.style.borderColor='#EF4444';label.textContent='KILL — ARMED';}
  else{btn.style.background='rgba(239,68,68,.14)';btn.style.color='#FF8A8A';btn.style.borderColor='rgba(239,68,68,.5)';label.textContent='KILL';}
}
function showDD(id,open){
  const el=document.getElementById(id);if(!el)return;
  el.style.opacity=open?'1':'0';
  el.style.transform=open?(id==='acct-menu'?'translateY(0) scale(1)':'translateY(0) scale(1)'):(id==='acct-menu'?'translateY(8px) scale(.98)':'translateY(-6px) scale(.97)');
  el.style.pointerEvents=open?'auto':'none';
}
function renderDropdowns(){
  showDD('acct-menu',state.acctOpen);showDD('profile-menu',state.profileOpen);
  document.getElementById('acct-chevron').style.transform=state.acctOpen?'rotate(180deg)':'';
  document.getElementById('acct-trigger').style.borderColor=state.acctOpen?'var(--sb-border)':'transparent';
  document.getElementById('profile-chevron').style.transform=state.profileOpen?'rotate(180deg)':'';
}
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';el.style.pointerEvents='auto';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity='0';el.style.pointerEvents='none';},2800);
}

function avatar(ini,grad,size,fs,round){

function chip(text,kind){
  const m={gray:{bg:'var(--subtle)',c:'var(--body)',b:'var(--border)'},green:{bg:'var(--profit-soft)',c:'var(--profit)',b:'color-mix(in srgb,var(--profit) 26%,transparent)'},blue:{bg:'rgba(59,130,246,.10)',c:'#2563EB',b:'rgba(59,130,246,.30)'},purple:{bg:'var(--mkt-purple-soft)',c:'var(--mkt-purple)',b:'color-mix(in srgb,var(--mkt-purple) 30%,transparent)'},red:{bg:'var(--loss-soft)',c:'var(--loss)',b:'color-mix(in srgb,var(--loss) 26%,transparent)'}}[kind]||{bg:'var(--subtle)',c:'var(--body)',b:'var(--border)'};
  return`<span style="font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;background:${m.bg};color:${m.c};white-space:nowrap;border:1px solid ${m.b}">${text}</span>`;

function curveSvg(seed,w,h,stroke){
  const n=28,pts=[];
  let acc=7;for(let i=0;i<seed.length;i++)acc=(acc*33+seed.charCodeAt(i))%99991;
  const rnd=(i)=>{const x=Math.sin((acc+1)*(i+1)*0.7321)*9973.13;return x-Math.floor(x);};
  for(let i=0;i<n;i++){const base=0.14+(i/(n-1))*0.66,noise=(rnd(i)-0.5)*0.14;pts.push(Math.max(0.06,Math.min(0.95,base+noise)));}
  const X=i=>(i/(n-1))*w,Y=v=>(h-v*h);
  let line='M '+X(0).toFixed(1)+' '+Y(pts[0]).toFixed(1);
  for(let i=1;i<n;i++)line+=' L '+X(i).toFixed(1)+' '+Y(pts[i]).toFixed(1);
  const area=line+' L '+w+' '+h+' L 0 '+h+' Z';
  const gid='mktg'+Math.abs(acc)+Math.round(w);
  return`<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${stroke}" stop-opacity="0.20"/><stop offset="100%" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${stroke}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function metricCell(label,value,color,last){
  return`<div style="flex:1;padding:9px 11px;border-right:${last?'none':'1px solid var(--border)'}"><span style="display:block;font-size:14px;font-weight:700;color:${color||'var(--head)'};font-variant-numeric:tabular-nums;line-height:1.1">${value}</span><span style="display:block;font-size:9px;font-weight:700;letter-spacing:0.06em;color:var(--muted);text-transform:uppercase;margin-top:4px">${label}</span></div>`;
}

// ── Filter ──
function filtered(){
  let list=strategies.slice();
  if(state.asset!=='all')list=list.filter(s=>s.cls===state.asset);
  if(state.pill==='Top rated')list=list.filter(s=>s.top||s.score>=80);
  else if(state.pill==='New')list=list.filter(s=>s.isNew||s.live<=2);
  else if(state.pill==='Free')list=list.filter(s=>s.price===0);
  const q=state.search.trim().toLowerCase();
  if(q)list=list.filter(s=>(s.name+' '+s.seller+' '+s.asset+' '+s.ind.join(' ')).toLowerCase().includes(q));
  const sorters={top:(a,b)=>b.score-a.score,new:(a,b)=>a.live-b.live,return:(a,b)=>b.ret-a.ret,win:(a,b)=>b.win-a.win,plow:(a,b)=>a.price-b.price,phigh:(a,b)=>b.price-a.price};
  list.sort(sorters[state.sort]||sorters.top);
  return list;
}

function monthlyHeat(seed){
  const months=['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
  let acc=3;for(let i=0;i<seed.length;i++)acc=(acc*29+seed.charCodeAt(i))%97;
  return`<div style="display:flex;gap:5px;">${months.map((m,i)=>{const r=Math.sin((acc+1)*(i+3)*1.37)*100,v=((r-Math.floor(r))*14-4),pos=v>=0;return`<div style="flex:1;min-width:0;"><div style="height:40px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:${pos?'var(--profit-soft)':'var(--loss-soft)'};border:1px solid ${pos?'color-mix(in srgb,var(--profit) 22%,transparent)':'color-mix(in srgb,var(--loss) 22%,transparent)'};"><span style="font-size:11px;font-weight:700;color:${pos?'var(--profit)':'var(--loss)'};">${pos?'+':''}${v.toFixed(1)}</span></div><span style="display:block;text-align:center;font-size:9px;color:var(--muted);margin-top:4px;">${m}</span></div>`;}).join('')}</div>`;
}

function recentSignals(s){
  let acc=11;for(let i=0;i<s.id.length;i++)acc=(acc*31+s.id.charCodeAt(i))%9973;
  const rows=[];
  for(let i=0;i<8;i++){
    const r=(k)=>{const x=Math.sin((acc+1)*(i+1)*(k+1.3)*0.91)*1000;return x-Math.floor(x);};
    const long=r(1)>0.42,win=r(2)>0.32,pnl=(win?1:-1)*(0.4+r(3)*2.4),conf=Math.round(55+r(4)*40);
    rows.push({date:'Jun '+(14-i),dir:long?'Long':'Short',entry:(s.cls==='Crypto'?64000+Math.round(r(5)*4000):19000+Math.round(r(5)*1200)).toLocaleString(),pnl:(pnl>=0?'+':'')+(pnl*(s.cls==='Crypto'?220:130)).toFixed(0),pnlPos:pnl>=0,conf});
  }
  return`<div>
    <div style="display:flex;padding:0 4px 8px;border-bottom:1px solid var(--border);">
      ${['Date','Dir','Entry','P&L','Conf'].map((h,i)=>`<span style="flex:${i===0?'0 0 70px':i===2?'0 0 90px':'1'};text-align:${i>=2?'right':'left'};font-size:10px;font-weight:700;letter-spacing:0.05em;color:var(--muted);text-transform:uppercase;">${h}</span>`).join('')}
    </div>
    ${rows.map(r=>`<div style="display:flex;align-items:center;padding:9px 4px;border-bottom:1px solid var(--border);">

        <div style="display:flex;gap:12px;"><div style="flex:1;"><label style="display:block;font-size:13px;font-weight:600;color:var(--head);margin-bottom:7px;">Expiry</label><input type="text" placeholder="MM / YY" style="width:100%;height:46px;padding:0 14px;font-family:var(--sans);font-size:15px;color:var(--head);background:var(--card);border:1px solid var(--border);border-radius:9px;outline:none;"></div><div style="flex:1;"><label style="display:block;font-size:13px;font-weight:600;color:var(--head);margin-bottom:7px;">CVC</label><input type="text" placeholder="CVC" style="width:100%;height:46px;padding:0 14px;font-family:var(--sans);font-size:15px;color:var(--head);background:var(--card);border:1px solid var(--border);border-radius:9px;outline:none;"></div></div>
        <div><label style="display:block;font-size:13px;font-weight:600;color:var(--head);margin-bottom:7px;">Name on card</label><input type="text" placeholder="David Cervantes" style="width:100%;height:46px;padding:0 14px;font-family:var(--sans);font-size:15px;color:var(--head);background:var(--card);border:1px solid var(--border);border-radius:9px;outline:none;"></div>
        <button id="flow-pay" style="height:52px;width:100%;border:none;border-radius:10px;background:var(--stripe);color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:9px;margin-top:2px;font-family:var(--sans);">${mkSvg('<path d="M5 11V8a7 7 0 0 1 14 0v3"/><path d="M5 11a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2z"/>','#fff',17)} Subscribe — $${s.price}/month</button>
        <span style="font-size:11.5px;color:var(--muted);text-align:center;line-height:1.55;">By subscribing you agree to Terms. Cancel anytime.</span>
      </div>
    </div>
  </div>`;
  document.getElementById('flow-back').addEventListener('click',()=>{state.flow={...f,step:1};renderFlowOverlay();});
  document.getElementById('flow-pay').addEventListener('click',()=>{
    const acct=accounts.find(a=>a.id===f.account);
    state.subs[f.id]=true;state.subMeta[f.id]={since:'Jun 14',account:acct.name};
    state.flow={...f,step:3};renderFlowOverlay();
  });
}
function renderFlowStep3(s,f,card){
  card.style.width='560px';
  const acct=accounts.find(a=>a.id===f.account);
  const rows=[['Strategy',s.name,'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'],['Routing to',acct.name,'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>'],['Billing','$'+s.price+'/mo · next Jul 14','<path d="M5 11V8a7 7 0 0 1 14 0v3"/><path d="M5 11a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2z"/>'],['Notifications','Signal alerts on','<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>']];
  card.innerHTML=`<div style="background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 24px 64px -16px rgba(15,23,36,.4);">
    <div style="padding:40px 36px 32px;text-align:center;border-bottom:1px solid var(--border);">
      <div style="width:72px;height:72px;border-radius:50%;margin:0 auto 20px;background:var(--profit-soft);border:1px solid color-mix(in srgb,var(--profit) 26%,transparent);display:flex;align-items:center;justify-content:center;">${mkSvg('<path d="M20 6 9 17l-5-5"/>','var(--profit)',34,2.4)}</div>
      <span style="display:block;font-size:24px;font-weight:800;color:var(--head);letter-spacing:-0.01em;">You're subscribed</span>
      <span style="display:block;font-size:15px;color:var(--body);margin-top:10px;line-height:1.6;max-width:420px;margin-left:auto;margin-right:auto;">Signals from <strong style="color:var(--head)">${s.name}</strong> are now routing to your <strong style="color:var(--head)">${acct.name}</strong> account.</span>
    </div>
    <div style="padding:20px 36px;">
      ${rows.map(([k,v,icon],i)=>`<div style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:${i<rows.length-1?'1px solid var(--border)':'none'};">${mkSvg(icon,'var(--muted)',17)}<span style="flex:1;font-size:14px;color:var(--muted);">${k}</span><span style="font-size:14px;font-weight:700;color:var(--head);">${v}</span></div>`).join('')}
    </div>
    <div style="padding:20px 36px 28px;display:flex;flex-direction:column;gap:11px;">
      <button onclick="window.location.href='chart.html'" style="height:50px;width:100%;border:none;border-radius:11px;background:var(--mkt-purple);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);">View live signals ${mkSvg('<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>','#fff',17)}</button>
      <button id="flow-close-3" style="height:50px;width:100%;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--body);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);">Back to Marketplace</button>
    </div>
  </div>`;
  document.getElementById('flow-close-3').addEventListener('click',()=>{state.flow=null;renderFlowOverlay();renderMarketplace();});
}
document.getElementById('flow-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('flow-overlay')&&state.flow&&state.flow.step!==3){state.flow=null;renderFlowOverlay();}});

// ── Controls ──
document.getElementById('collapse-btn').addEventListener('click',()=>{state.collapsed=!state.collapsed;applySidebar();});
document.getElementById('theme-btn').addEventListener('click',()=>{state.dark=!state.dark;applyTheme();renderMarketplace();renderDetailDrawer();renderManageDrawer();});
document.getElementById('kill-btn').addEventListener('click',()=>{state.killArmed=!state.killArmed;applyKill();});
document.getElementById('acct-trigger').addEventListener('click',()=>{state.acctOpen=!state.acctOpen;renderDropdowns();});
document.getElementById('profile-btn').addEventListener('click',e=>{e.stopPropagation();state.profileOpen=!state.profileOpen;renderDropdowns();});
document.addEventListener('click',e=>{
  let ch=false;
  if(state.profileOpen&&!e.target.closest('#profile-btn')&&!e.target.closest('#profile-menu')){state.profileOpen=false;ch=true;}
  if(state.acctOpen&&!e.target.closest('#acct-trigger')&&!e.target.closest('#acct-menu')){state.acctOpen=false;ch=true;}
  if(ch)renderDropdowns();
});

applySidebar();applyTheme();applyKill();renderMarketplace();
</script>
