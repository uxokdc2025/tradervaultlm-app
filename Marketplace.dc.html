<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    :root { --profit-soft:rgba(21,128,61,.12); --loss-soft:rgba(220,38,38,.12); --warn:#D97706; --warn-soft:rgba(217,119,6,.14); --page:#F7F6F1; --mkt-purple:#7C3AED; --mkt-purple-soft:rgba(124,58,237,.10); --mkt-green:#16A34A; --stripe:#635BFF; }
    .tv-dark { --profit-soft:rgba(34,197,94,.16); --loss-soft:rgba(248,113,113,.16); --warn:#FBBF24; --warn-soft:rgba(251,191,36,.16); --page:#0B131B; --mkt-purple:#A78BFA; --mkt-purple-soft:rgba(167,139,250,.14); --mkt-green:#22C55E; }
    .mkt-scroll::-webkit-scrollbar { width:10px; height:10px; }
    .mkt-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:6px; }
    @keyframes mkt-pulse { 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.45; transform:scale(.8);} }
    @keyframes mkt-slide-in { from{ transform:translateX(100%);} to{ transform:translateX(0);} }
    @keyframes mkt-fade { from{ opacity:0;} to{ opacity:1;} }
    @keyframes mkt-pop { from{ opacity:0; transform:translateY(8px) scale(.98);} to{ opacity:1; transform:translateY(0) scale(1);} }
  </style>
</helmet>
<dc-import name="_Shell"
  active-page="marketplace"
  page-title="Marketplace"
  page-subtitle="Subscribe to proven strategies — signals delivered to your broker"
  on-nav-overview="{{ goOverview }}"
  on-nav-strategies="{{ goStrategies }}"
  on-nav-analysis="{{ goAnalysis }}"
  on-nav-chart="{{ goChart }}"
  on-nav-audit="{{ goAudit }}"
  on-nav-marketplace="{{ goMarketplace }}"
  on-nav-mysignals="{{ goSoon }}"
  on-nav-settings="{{ goSoon }}"
  hint-size="100%,100%">
  {{ marketplaceEl }}
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = {
    search: '', asset: 'all', sort: 'top', pill: 'All',
    subs: { 'nq-momentum': true, 'vwap-eu': true },
    subMeta: { 'nq-momentum': { since: 'Jun 1', account: 'Alpaca paper' }, 'vwap-eu': { since: 'May 20', account: 'Alpaca live' } },
    paused: {},
    detailId: null, manageOpen: false,
    flow: null, // { id, step:1|2|3, account }
    confirmCancel: null,
    toastMsg: null,
  };
  componentWillUnmount() { if (this._t) clearTimeout(this._t); }
  toast(m) { this.setState({ toastMsg: m }); if (this._t) clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toastMsg: null }), 2800); }

  e(t, p, ...k) { return React.createElement(t, p, ...k); }
  d(style, ...k) { return React.createElement('div', { style }, ...k); }
  sp(style, ...k) { return React.createElement('span', { style }, ...k); }
  btn(p, ...k) { return React.createElement('button', { type: 'button', ...p }, ...k); }
  ic(paths, color, size, sw) { const h = React.createElement; return h('svg', { width: size || 16, height: size || 16, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: sw || 2, strokeLinecap: 'round', strokeLinejoin: 'round', style: { flexShrink: 0 } }, paths.map((dd, i) => h('path', { key: i, d: dd }))); }

  // ── DATA ──
  strategies() {
    return [
      { id: 'nq-momentum', name: 'NQ Momentum Pro', seller: 'James R.', ini: 'JR', grad: ['#7C5CFF', '#3DD5A8'], subs: 847, score: 87, ret: 31.4, win: 74, dd: -7.2, sharpe: 1.92, asset: 'NQ Futures', tf: '5m', style: 'Intraday', ind: ['MACD', 'VWAP'], live: 6, price: 49, cls: 'Futures', top: true, isNew: false },
      { id: 'vwap-eu', name: 'VWAP Scalper EU', seller: 'Maria K.', ini: 'MK', grad: ['#2DD4BF', '#15A88B'], subs: 412, score: 71, ret: 18.2, win: 68, dd: -5.8, sharpe: 1.54, asset: 'EUR/USD', tf: '1H', style: 'Scalp', ind: ['VWAP', 'EMA'], live: 4, price: 29, cls: 'Forex', top: false, isNew: false },
      { id: 'btc-mean', name: 'BTC Mean Reversion', seller: 'Alex S.', ini: 'AS', grad: ['#F59E0B', '#D97706'], subs: 203, score: 76, ret: 42.1, win: 71, dd: -11.4, sharpe: 1.71, asset: 'BTC/USDT', tf: '4H', style: 'Swing', ind: ['RSI', 'BB'], live: 2, price: 39, cls: 'Crypto', top: false, isNew: true },
      { id: 'es-scalp', name: 'ES Scalp Machine', seller: 'Tom W.', ini: 'TW', grad: ['#3B82F6', '#2563EB'], subs: 1204, score: 82, ret: 28.7, win: 77, dd: -6.1, sharpe: 2.14, asset: 'ES Futures', tf: '1m', style: 'Scalp', ind: ['VWAP', 'Delta'], live: 12, price: 79, cls: 'Futures', top: false, isNew: false },
      { id: 'gbp-swing', name: 'GBP Swing Basic', seller: 'Pedro L.', ini: 'PL', grad: ['#A855F7', '#D946A6'], subs: 89, score: 58, ret: 11.3, win: 58, dd: -9.2, sharpe: 0.98, asset: 'GBP/USD', tf: '4H', style: 'Swing', ind: ['EMA', 'RSI'], live: 1, price: 0, cls: 'Forex', top: false, isNew: true },
      { id: 'spy-trend', name: 'SPY Trend Rider', seller: 'Sarah R.', ini: 'SR', grad: ['#2DD4BF', '#15A88B'], subs: 317, score: 79, ret: 24.6, win: 72, dd: -8.4, sharpe: 1.63, asset: 'SPY', tf: '1H', style: 'Position', ind: ['ADX', 'EMA'], live: 3, price: 19, cls: 'Equities', top: false, isNew: false },
    ];
  }
  byId(id) { return this.strategies().find(s => s.id === id); }
  accounts() {
    return [
      { id: 'alpaca-paper', name: 'Alpaca paper', ini: 'A', bal: '$99,843.78', mode: 'Paper' },
      { id: 'alpaca-live', name: 'Alpaca live', ini: 'A', bal: '$24,200.00', mode: 'Live' },
      { id: 'ib', name: 'Interactive Brokers', ini: 'IB', bal: '$51,400.00', mode: 'Live' },
    ];
  }

  // ── primitives ──
  money(p) { return p === 0 ? 'Free' : '$' + p + '/mo'; }
  scoreColor(s) { if (s >= 90) return 'var(--warn)'; if (s >= 70) return 'var(--mkt-green)'; if (s >= 55) return 'var(--mkt-purple)'; if (s >= 40) return 'var(--warn)'; return 'var(--loss)'; }
  avatar(ini, grad, size, fs) {
    return this.d({ width: size + 'px', height: size + 'px', borderRadius: size >= 40 ? '11px' : '50%', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,' + grad[0] + ',' + grad[1] + ')', color: '#fff', fontWeight: 700, fontSize: (fs || 13) + 'px', letterSpacing: '0.02em' }, ini);
  }
  liveDot(color) { return this.d({ width: '8px', height: '8px', borderRadius: '50%', background: color || 'var(--mkt-green)', flexShrink: 0, animation: 'mkt-pulse 1.8s ease-in-out infinite' }); }
  chip(text, kind) {
    const m = { gray: { bg: 'var(--subtle)', c: 'var(--body)', b: 'var(--border)' }, green: { bg: 'var(--profit-soft)', c: 'var(--profit)', b: 'color-mix(in srgb,var(--profit) 26%,transparent)' }, blue: { bg: 'rgba(59,130,246,.10)', c: '#2563EB', b: 'rgba(59,130,246,.30)' }, purple: { bg: 'var(--mkt-purple-soft)', c: 'var(--mkt-purple)', b: 'color-mix(in srgb,var(--mkt-purple) 30%,transparent)' }, red: { bg: 'var(--loss-soft)', c: 'var(--loss)', b: 'color-mix(in srgb,var(--loss) 26%,transparent)' } }[kind] || { bg: 'var(--subtle)', c: 'var(--body)', b: 'var(--border)' };
    return this.sp({ fontSize: '11px', fontWeight: 600, padding: '4px 9px', borderRadius: '6px', background: m.bg, color: m.c, whiteSpace: 'nowrap', border: '1px solid ' + m.b }, text);
  }
  curveSvg(seed, w, h, stroke) {
    const n = 28, pts = [];
    let acc = 7; for (let i = 0; i < seed.length; i++) acc = (acc * 33 + seed.charCodeAt(i)) % 99991;
    const rnd = (i) => { const x = Math.sin((acc + 1) * (i + 1) * 0.7321) * 9973.13; return x - Math.floor(x); };
    for (let i = 0; i < n; i++) { const base = 0.14 + (i / (n - 1)) * 0.66; const noise = (rnd(i) - 0.5) * 0.14; pts.push(Math.max(0.06, Math.min(0.95, base + noise))); }
    const X = i => (i / (n - 1)) * w, Y = v => (h - v * h);
    let line = 'M ' + X(0).toFixed(1) + ' ' + Y(pts[0]).toFixed(1);
    for (let i = 1; i < n; i++) line += ' L ' + X(i).toFixed(1) + ' ' + Y(pts[i]).toFixed(1);
    const area = line + ' L ' + w + ' ' + h + ' L 0 ' + h + ' Z';
    const gid = 'mktg' + Math.abs(acc) + Math.round(w);
    return this.e('svg', { width: '100%', height: h, viewBox: '0 0 ' + w + ' ' + h, preserveAspectRatio: 'none', style: { display: 'block' } },
      this.e('defs', {}, this.e('linearGradient', { id: gid, x1: '0', y1: '0', x2: '0', y2: '1' },
        this.e('stop', { offset: '0%', stopColor: stroke, stopOpacity: '0.20' }),
        this.e('stop', { offset: '100%', stopColor: stroke, stopOpacity: '0' }))),
      this.e('path', { d: area, fill: 'url(#' + gid + ')' }),
      this.e('path', { d: line, fill: 'none', stroke: stroke, strokeWidth: '1.6', strokeLinejoin: 'round', strokeLinecap: 'round' }));
  }
  metricCell(label, value, color, first, last) {
    return this.d({ flex: 1, padding: '9px 11px', borderRight: last ? 'none' : '1px solid var(--border)' },
      this.sp({ display: 'block', fontSize: '14px', fontWeight: 700, color: color || 'var(--head)', fontVariantNumeric: 'tabular-nums', lineHeight: '1.1' }, value),
      this.sp({ display: 'block', fontSize: '9px', fontWeight: 700, letterSpacing: '0.06em', color: 'var(--muted)', textTransform: 'uppercase', marginTop: '4px' }, label));
  }

  // ── SUBSCRIBE STATE ──
  isSub(id) { return !!this.state.subs[id]; }
  openFlow(id) { this.setState({ flow: { id, step: 1, account: 'alpaca-paper' }, detailId: null }); }
  subscribeClick(id) { if (this.isSub(id)) { this.toast('Already subscribed — manage it from Your subscriptions'); return; } this.openFlow(id); }
  completeSubscribe() {
    const f = this.state.flow; if (!f) return;
    const acct = this.accounts().find(a => a.id === f.account);
    this.setState(s => ({ subs: { ...s.subs, [f.id]: true }, subMeta: { ...s.subMeta, [f.id]: { since: 'Jun 14', account: acct.name } }, flow: { ...f, step: 3 } }));
  }

  // ── SEARCH / FILTER BAR ──
  selectEl(value, options, onChange, w) {
    return this.d({ position: 'relative', width: w || 'auto', flex: w ? 'none' : 1 },
      this.e('select', { value, onChange, style: { width: '100%', height: '50px', padding: '0 40px 0 18px', fontFamily: 'var(--sans)', fontSize: '16px', fontWeight: 600, color: 'var(--head)', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '12px', outline: 'none', appearance: 'none', WebkitAppearance: 'none', cursor: 'pointer' } }, ...options.map(o => this.e('option', { key: o[0], value: o[0] }, o[1]))),
      this.d({ position: 'absolute', right: '16px', top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }, this.ic(['m6 9 6 6 6-6'], 'var(--muted)', 18)));
  }
  filterBar() {
    const st = this.state;
    const search = this.d({ position: 'relative', width: '116px', flexShrink: 0 },
      this.d({ position: 'absolute', left: '16px', top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }, this.ic(['M11 11m-8 0a8 8 0 1 0 16 0 8 8 0 0 0-16 0', 'm21 21-4.3-4.3'], 'var(--muted)', 18)),
      this.e('input', { type: 'text', value: st.search, placeholder: '', title: 'Search strategies, traders, assets…', onChange: (e) => this.setState({ search: e.target.value }), style: { width: '100%', height: '50px', padding: '0 12px 0 44px', fontFamily: 'var(--sans)', fontSize: '15px', color: 'var(--head)', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '12px', outline: 'none' } }));
    const assetOpts = [['all', 'All assets'], ['Futures', 'Futures'], ['Forex', 'Forex'], ['Crypto', 'Crypto'], ['Equities', 'Equities']];
    const pills = ['All', 'Top rated', 'New', 'Free'];
    const pillBar = this.d({ display: 'flex', alignItems: 'center', gap: '10px', flexShrink: 0 }, ...pills.map(p => {
      const on = st.pill === p;
      return this.btn({ key: p, onClick: () => this.setState({ pill: p }), style: { height: '44px', padding: '0 20px', borderRadius: '999px', fontFamily: 'var(--sans)', fontSize: '15px', fontWeight: 600, cursor: 'pointer', background: on ? 'var(--mkt-purple)' : 'var(--card)', color: on ? '#fff' : 'var(--body)', border: '1px solid ' + (on ? 'var(--mkt-purple)' : 'var(--border)'), transition: 'all .12s' } }, p);
    }));
    return this.d({ display: 'flex', alignItems: 'center', gap: '14px', rowGap: '14px', flexWrap: 'wrap' }, search, this.selectEl(st.asset, assetOpts, (e) => this.setState({ asset: e.target.value }), '300px'), this.d({ flex: 1, minWidth: '8px' }), pillBar);
  }

  filtered() {
    const st = this.state; let list = this.strategies().slice();
    if (st.asset !== 'all') list = list.filter(s => s.cls === st.asset);
    if (st.pill === 'Top rated') list = list.filter(s => s.top || s.score >= 80);
    else if (st.pill === 'New') list = list.filter(s => s.isNew || s.live <= 2);
    else if (st.pill === 'Free') list = list.filter(s => s.price === 0);
    const q = st.search.trim().toLowerCase();
    if (q) list = list.filter(s => (s.name + ' ' + s.seller + ' ' + s.asset + ' ' + s.ind.join(' ')).toLowerCase().includes(q));
    const sorters = { top: (a, b) => b.score - a.score, new: (a, b) => a.live - b.live, return: (a, b) => b.ret - a.ret, win: (a, b) => b.win - a.win, plow: (a, b) => a.price - b.price, phigh: (a, b) => b.price - a.price };
    list.sort(sorters[st.sort] || sorters.top);
    return list;
  }

  // ── ACTIVE SUBSCRIPTIONS ROW ──
  miniCard(s) {
    const meta = this.state.subMeta[s.id] || { since: '—' };
    const paused = !!this.state.paused[s.id];
    return this.btn({ key: s.id, onClick: () => this.setState({ detailId: s.id }), style: { flexShrink: 0, width: '300px', textAlign: 'left', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '14px', padding: '16px 18px', cursor: 'pointer', fontFamily: 'var(--sans)', display: 'flex', flexDirection: 'column', gap: '12px', transition: 'border-color .12s' }, 'style-hover': '' },
      this.d({ display: 'flex', alignItems: 'center', gap: '11px' },
        this.avatar(s.ini, s.grad, 34, 12),
        this.sp({ flex: 1, fontSize: '15px', fontWeight: 700, color: 'var(--head)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }, s.name),
        paused ? this.liveDot('var(--warn)') : this.liveDot()),
      this.d({ display: 'flex', alignItems: 'flex-end', gap: '18px' },
        this.d({}, this.sp({ display: 'block', fontSize: '15px', fontWeight: 700, color: 'var(--profit)', fontVariantNumeric: 'tabular-nums' }, '+' + s.ret + '%'), this.sp({ fontSize: '9px', fontWeight: 700, letterSpacing: '0.06em', color: 'var(--muted)' }, 'RETURN')),
        this.d({}, this.sp({ display: 'block', fontSize: '15px', fontWeight: 700, color: 'var(--head)', fontVariantNumeric: 'tabular-nums' }, s.win + '%'), this.sp({ fontSize: '9px', fontWeight: 700, letterSpacing: '0.06em', color: 'var(--muted)' }, 'WIN')),
        this.d({}, this.sp({ display: 'block', fontSize: '15px', fontWeight: 700, color: this.scoreColor(s.score), fontVariantNumeric: 'tabular-nums' }, '' + s.score), this.sp({ fontSize: '9px', fontWeight: 700, letterSpacing: '0.06em', color: 'var(--muted)' }, 'SCORE'))),
      this.sp({ fontSize: '12px', color: 'var(--muted)' }, 'Since ' + meta.since + ' · ' + this.money(s.price)));
  }
  subscriptionsRow() {
    const subbed = this.strategies().filter(s => this.isSub(s.id));
    const cards = subbed.map(s => this.miniCard(s));
    const addCard = this.btn({ key: 'add', onClick: () => { const el = document.getElementById('mkt-discover'); if (el) el.scrollTop = el.offsetTop; this.toast('Browse the strategies below'); }, style: { flexShrink: 0, minWidth: '320px', flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', background: 'transparent', border: '1.5px dashed var(--border-2,var(--border))', borderRadius: '14px', padding: '16px', cursor: 'pointer', fontFamily: 'var(--sans)', color: 'var(--muted)' } },
      this.ic(['M12 5v14', 'M5 12h14'], 'currentColor', 18), this.sp({ fontSize: '15px', fontWeight: 600 }, 'Browse below to add more'));
    const header = this.d({ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '14px' },
      this.sp({ fontSize: '19px', fontWeight: 700, color: 'var(--head)', letterSpacing: '-0.01em' }, 'Your subscriptions'),
      this.btn({ onClick: () => this.setState({ manageOpen: true }), style: { display: 'inline-flex', alignItems: 'center', gap: '6px', background: 'none', border: 'none', color: 'var(--mkt-purple)', fontFamily: 'var(--sans)', fontSize: '15px', fontWeight: 600, cursor: 'pointer' } }, 'Manage', this.ic(['M5 12h14', 'm12 5 7 7-7 7'], 'currentColor', 16)));
    return this.d({},
      header,
      this.d({ display: 'flex', gap: '16px', overflowX: 'auto', paddingBottom: '4px' }, ...cards, addCard));
  }

  // ── STRATEGY CARD ──
  strategyCard(s) {
    const subbed = this.isSub(s.id);
    const tags = [s.asset, s.tf, s.style, ...s.ind, s.live + 'M live'];
    const subBtn = this.btn({ onClick: (e) => { e.stopPropagation(); this.subscribeClick(s.id); }, style: { height: '46px', padding: '0 22px', minWidth: '150px', border: 'none', borderRadius: '10px', fontFamily: 'var(--sans)', fontSize: '15px', fontWeight: 700, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '8px', background: subbed ? 'var(--mkt-green)' : 'var(--mkt-purple)', color: '#fff', transition: 'filter .12s' }, 'style-hover': 'filter:brightness(1.06)' },
      subbed ? this.ic(['M20 6 9 17l-5-5'], '#fff', 16, 2.6) : null, subbed ? 'Subscribed' : 'Subscribe');
    return this.btn({ key: s.id, onClick: () => this.setState({ detailId: s.id }), style: { display: 'flex', flexDirection: 'column', textAlign: 'left', background: 'var(--card)', border: (s.top ? '1.5px solid var(--mkt-purple)' : '1px solid var(--border)'), borderRadius: '16px', overflow: 'hidden', cursor: 'pointer', fontFamily: 'var(--sans)', boxShadow: '0 1px 2px rgba(15,23,36,.04)' } },
      // header
      this.d({ padding: '16px 18px 0', display: 'flex', gap: '13px' },
        this.avatar(s.ini, s.grad, 46, 15),
        this.d({ flex: 1, minWidth: 0 },
          s.top ? this.sp({ display: 'inline-block', fontSize: '10px', fontWeight: 800, letterSpacing: '0.07em', color: 'var(--mkt-purple)', background: 'var(--mkt-purple-soft)', padding: '3px 8px', borderRadius: '5px', marginBottom: '5px' }, 'TOP RATED') : null,
          this.sp({ display: 'block', fontSize: '17px', fontWeight: 700, color: 'var(--head)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', letterSpacing: '-0.01em' }, s.name),
          this.sp({ display: 'block', fontSize: '13px', color: 'var(--muted)', marginTop: '2px' }, s.seller + ' · ' + s.subs.toLocaleString() + ' subscribers')),
        this.sp({ fontSize: '28px', fontWeight: 800, color: this.scoreColor(s.score), fontVariantNumeric: 'tabular-nums', lineHeight: '1' }, '' + s.score)),
      // curve
      this.d({ padding: '12px 18px 4px', height: '52px' }, this.curveSvg(s.id, 320, 44, 'var(--mkt-green)')),
      // metric pills
      this.d({ margin: '6px 18px 0', display: 'flex', border: '1px solid var(--border)', borderRadius: '10px', overflow: 'hidden' },
        this.metricCell('Return', '+' + s.ret + '%', 'var(--profit)'),
        this.metricCell('Win', s.win + '%', 'var(--profit)'),
        this.metricCell('Max DD', s.dd + '%', 'var(--loss)'),
        this.metricCell('Sharpe', '' + s.sharpe, 'var(--head)', false, true)),
      // tags
      this.d({ padding: '14px 18px 16px', display: 'flex', flexWrap: 'wrap', gap: '7px', flex: 1, alignContent: 'flex-start' }, ...tags.map((t, i) => React.cloneElement(this.chip(t, t.indexOf('live') >= 0 ? 'green' : 'gray'), { key: i }))),
      // footer
      this.d({ marginTop: 'auto', padding: '14px 18px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px' },
        this.d({}, this.sp({ display: 'block', fontSize: '18px', fontWeight: 800, color: 'var(--head)' }, this.money(s.price)), this.sp({ fontSize: '12px', color: 'var(--muted)' }, s.subs.toLocaleString() + ' subscribers')),
        subBtn));
  }
  discoverGrid() {
    const list = this.filtered();
    const sortOpts = [['top', 'Top rated'], ['new', 'Newest'], ['return', 'Return'], ['win', 'Win rate'], ['plow', 'Price low→high'], ['phigh', 'Price high→low']];
    const header = this.d({ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px', marginBottom: '16px', flexWrap: 'wrap' },
      this.d({ display: 'flex', alignItems: 'baseline', gap: '10px' },
        this.sp({ fontSize: '19px', fontWeight: 700, color: 'var(--head)', letterSpacing: '-0.01em' }, 'Discover strategies'),
