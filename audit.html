<style>
:root{
  --bg:#FFFFFF; --card:#F8FAFC; --subtle:#F1F5F9; --border:#E2E8F0; --input:#CBD5E1;
  --muted:#64718A; --body:#475569; --head:#1E293B;
  --lime:#C8FF00; --navy:#101B25; --navy-light:#18242F;
  --accent:#7C3AED; --accent-on:#FFFFFF; --accent-soft:rgba(124,58,237,.12); --link:#7C3AED;
  --profit:#15803D; --loss:#DC2626; --warn:#D97706; --info:#3B82F6;
  --warn-soft:rgba(217,119,6,.14); --profit-soft:rgba(21,128,61,.12); --loss-soft:rgba(220,38,38,.12);
  --sb-bg:#101B25; --sb-fg:#9DAAB6; --sb-muted:#7E8C99; --sb-hover:#1B2731; --sb-border:#2A3640;
  --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',ui-sans-serif,system-ui,sans-serif;
  --page:#F7F6F1;
}
.tv-dark{
  --bg:#0B131B; --card:#101B25; --subtle:#18242F; --border:#28333D; --input:#2F3C47;
  --muted:#8492A0; --body:#AEB9C4; --head:#F1F4F7; --link:#A78BFA;
  --navy:#18242F; --navy-light:#1C2832;
  --accent:#C8FF00; --accent-on:#101B25; --accent-soft:rgba(200,255,0,.16);
  --profit:#22C55E; --loss:#F87171; --warn:#FBBF24;
  --profit-soft:rgba(34,197,94,.16); --loss-soft:rgba(248,113,113,.16); --warn-soft:rgba(251,191,36,.16);
  --page:#0B131B;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--sans);color:var(--body);background:var(--bg);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:2px solid var(--bg);}
button{font-family:var(--sans);}
a{text-decoration:none;}
@keyframes tvpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
select{font-family:var(--sans);}
textarea{font-family:var(--sans);}
</style>
</head>

    <div id="sb-footer">

<div id="toast" style="position:fixed;bottom:20px;right:20px;z-index:300;background:var(--head);color:var(--bg);padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(15,23,36,.22);max-width:340px;opacity:0;transition:opacity .2s;pointer-events:none;"></div>

<script>
// ── State ──
const state = {
  collapsed:false, dark:false, acctOpen:false, killArmed:false,
  notifOpen:false, profileOpen:false,
  filter:'All', strat:'mb1', range:'Today', search:'',
  openRow:null, collapsed_groups:{},
  notes:[
    {id:'n1',text:'Paused briefly Jun 13 ahead of Fed announcement — resumed after. Pattern degradation warning flagged by AI — monitoring closely before deciding to run new backtest.',meta:'Jun 14 · 9:20am · by you'},
    {id:'n2',text:'Reduced max contracts from 3 to 2 after margin rejection on Jun 14 morning. Need to review position sizing in Backtest Config.',meta:'Jun 14 · 9:35am · by you'},
  ],
  draft:'', composerOpen:false, notePublic:false, toastMsg:null,
};

// ── Sidebar ──
function applySidebar() {
  const sb=document.getElementById('sidebar'), c=state.collapsed;
  sb.style.width=c?'58px':'234px';
  document.querySelectorAll('.nav-label').forEach(el=>el.style.display=c?'none':'');
  document.querySelectorAll('.nav-section').forEach(el=>el.style.display=c?'none':'');
  document.getElementById('logo-mark').style.display=c?'block':'none';
  document.getElementById('logo-wordmark').style.display=c?'none':'block';
  document.getElementById('sb-footer').style.display=c?'none':'block';
}
function fmtClock(d){return[d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()].map(n=>String(n).padStart(2,'0')).join(':');}
function tickClock(){const el=document.getElementById('clock-display');if(el)el.textContent=fmtClock(new Date());}
tickClock();setInterval(tickClock,1000);
function applyTheme(){
  document.body.classList.toggle('tv-dark',state.dark);
  document.getElementById('theme-moon').style.display=state.dark?'none':'inline-flex';
  document.getElementById('theme-sun').style.display=state.dark?'inline-flex':'none';
}
function applyKill(){
  const btn=document.getElementById('kill-btn'),label=document.getElementById('kill-label');
  if(state.killArmed){btn.style.background='rgba(239,68,68,.9)';btn.style.color='#fff';btn.style.borderColor='#EF4444';label.textContent='KILL — ARMED';}
  else{btn.style.background='rgba(239,68,68,.14)';btn.style.color='#FF8A8A';btn.style.borderColor='rgba(239,68,68,.5)';label.textContent='KILL';}
}
function showDD(id,open){
  const el=document.getElementById(id);if(!el)return;
  el.style.opacity=open?'1':'0';
  el.style.transform=open?(id==='acct-menu'?'translateY(0) scale(1)':'translateY(0) scale(1)'):(id==='acct-menu'?'translateY(8px) scale(.98)':'translateY(-6px) scale(.97)');
  el.style.pointerEvents=open?'auto':'none';
}

function matches(ev){
  if(state.filter!=='All'){const map={Filled:'filled',Skipped:'skipped',Rejected:'rejected',Warnings:'warning',System:'system'};if(ev.type!==map[state.filter])return false;}
  if(state.strat!=='all'&&ev.strat!==state.strat)return false;
  if(state.search.trim()&&!(ev.text+' '+ev.title).toLowerCase().includes(state.search.trim().toLowerCase()))return false;
  return true;
}

  const root=document.getElementById('audit-root');
  const header=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
    <div>
      <span style="display:block;font-size:28px;font-weight:800;color:var(--head);letter-spacing:-0.02em">Audit log</span>
      <span style="display:block;font-size:14px;color:var(--muted);margin-top:5px">Every signal, fill, skip, and system event — in plain English</span>
    </div>
    <button id="export-btn" style="display:flex;align-items:center;gap:8px;height:40px;padding:0 16px;background:transparent;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--body);cursor:pointer">
      ${mkSvg('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>','currentColor',16)} Export CSV
    </button>
  </div>`;
  const groups=`<div>${dateGroupHTML('today','Today — Jun 14, 2026',12,eventsData.today)}${dateGroupHTML('yesterday','Yesterday — Jun 13, 2026',8,eventsData.yesterday)}</div>`;
  const anyVisible=eventsData.today.some(e=>matches(e))||eventsData.yesterday.some(e=>matches(e));
  const empty=!anyVisible?`<div style="padding:48px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:12px"><span style="font-size:14px;color:var(--muted)">No events match these filters</span></div>`:'';
  root.innerHTML=header+summaryStripHTML()+filterBarHTML()+`<div style="margin-top:2px">${groups}${empty}</div>`+notesSection();

  // Wire filter pills
  document.querySelectorAll('.filter-pill').forEach(el=>el.addEventListener('click',()=>{state.filter=el.dataset.p;renderAudit();}));
  // strat/range selects
  const stratSel=document.getElementById('strat-sel');if(stratSel)stratSel.addEventListener('change',e=>{state.strat=e.target.value;state.openRow=null;renderAudit();});
  const rangeSel=document.getElementById('range-sel');if(rangeSel)rangeSel.addEventListener('change',e=>{state.range=e.target.value;renderAudit();});
  // search
  const searchInp=document.getElementById('search-inp');if(searchInp)searchInp.addEventListener('input',e=>{state.search=e.target.value;renderAudit();});
  // export
  const expBtn=document.getElementById('export-btn');if(expBtn)expBtn.addEventListener('click',()=>showToast('Export CSV — logic coming soon'));
  // group headers
  document.querySelectorAll('.group-hdr').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.key;state.collapsed_groups[k]=!state.collapsed_groups[k];renderAudit();}));
  // row toggles
  document.querySelectorAll('.row-toggle').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.id;state.openRow=state.openRow===id?null:id;renderAudit();}));
  // note buttons
  document.querySelectorAll('.note-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const ref=el.dataset.title.split(' — ')[0];state.draft='Re: '+ref+' at '+el.dataset.time+' — ';state.composerOpen=true;renderAudit();showToast('Note started — finish it in Instance notes below');}));
  // delete notes
  document.querySelectorAll('.del-note').forEach(el=>el.addEventListener('click',()=>{state.notes=state.notes.filter(n=>n.id!==el.dataset.nid);renderAudit();showToast('Note deleted');}));
  // open composer
  const oc=document.getElementById('open-composer');if(oc)oc.addEventListener('click',()=>{state.composerOpen=true;renderAudit();});
  // note textarea
  const ta=document.getElementById('note-ta');if(ta)ta.addEventListener('input',e=>{state.draft=e.target.value;const saveBtn=document.getElementById('note-save');if(saveBtn){const ready=state.draft.trim().length>0;saveBtn.style.background=ready?'var(--accent)':'var(--subtle)';saveBtn.style.color=ready?'var(--accent-on)':'var(--muted)';}});
  // note cancel
  const nc=document.getElementById('note-cancel');if(nc)nc.addEventListener('click',()=>{state.composerOpen=false;state.draft='';renderAudit();});
  // note save
  const ns=document.getElementById('note-save');if(ns)ns.addEventListener('click',()=>{if(!state.draft.trim()){showToast('Write something first');return;}state.notes.push({id:'n'+Date.now(),text:state.draft.trim(),meta:'Jun 14 · just now · by you'+(state.notePublic?' · visible to followers':'')});state.draft='';state.composerOpen=false;renderAudit();showToast('Note added to this instance');});
  // note visibility
  const nv=document.getElementById('note-visibility');if(nv)nv.addEventListener('click',()=>{state.notePublic=!state.notePublic;renderAudit();});
}

// ── Controls ──
document.getElementById('collapse-btn').addEventListener('click',()=>{state.collapsed=!state.collapsed;applySidebar();});
document.getElementById('theme-btn').addEventListener('click',()=>{state.dark=!state.dark;applyTheme();renderAudit();});
document.getElementById('kill-btn').addEventListener('click',()=>{state.killArmed=!state.killArmed;applyKill();});
document.getElementById('acct-trigger').addEventListener('click',()=>{state.acctOpen=!state.acctOpen;renderDropdowns();});
document.getElementById('notif-btn').addEventListener('click',e=>{e.stopPropagation();state.notifOpen=!state.notifOpen;renderDropdowns();});
document.getElementById('profile-btn').addEventListener('click',e=>{e.stopPropagation();state.profileOpen=!state.profileOpen;renderDropdowns();});
document.addEventListener('click',e=>{
  let ch=false;
  if(state.notifOpen&&!e.target.closest('#notif-btn')&&!e.target.closest('#notif-menu')){state.notifOpen=false;ch=true;}
  if(state.profileOpen&&!e.target.closest('#profile-btn')&&!e.target.closest('#profile-menu')){state.profileOpen=false;ch=true;}
  if(state.acctOpen&&!e.target.closest('#acct-trigger')&&!e.target.closest('#acct-menu')){state.acctOpen=false;ch=true;}
  if(ch)renderDropdowns();
});

applySidebar();applyTheme();applyKill();renderAudit();
</script>
</body>
</html>
